<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Consultórios</title>

<style>
body{
    font-family:Arial;
    margin:0;
    padding:20px;
    background:#eef2f7;
}

.topo{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

h1{
    color:#0d6efd;
    margin:0;
}

#relogio{
    background:#000;
    color:#0f0;
    padding:10px 20px;
    border-radius:10px;
    font-size:20px;
    font-weight:bold;
}

#data{
    color:#555;
    margin-top:5px;
}

.caixa{
    background:#fff;
    padding:15px;
    margin-top:20px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

h2{
    margin:0 0 10px 0;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.item{
    background:#f4f4f4;
    padding:10px;
    border-radius:8px;
}

.numero{
    font-weight:bold;
    font-size:16px;
}

input{
    width:100%;
    padding:6px;
    margin-top:3px;
    margin-bottom:5px;
}

.status{
    font-weight:bold;
}

.on{color:green;}
.off{color:red;}

button{
    padding:6px 10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    color:white;
}

.btnOn{background:#28a745;}
.btnOff{background:#dc3545;}
</style>
</head>

<body>

<div class="topo">
    <div>
        <h1>Painel Consultórios</h1>
        <div id="data"></div>
    </div>
    <div id="relogio"></div>
</div>

<div id="conteudo"></div>

<script>

function relogio(){
    const d=new Date();
    document.getElementById("relogio").innerHTML=d.toLocaleTimeString();
    document.getElementById("data").innerHTML=
    d.toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"2-digit",year:"numeric"});
}

// ===== CONSULTÓRIOS =====
let dias=["segunda","terca","quarta","quinta","sexta"];

let dados={};

dias.forEach(dia=>{
    dados[dia]=[];

    for(let i=3;i<=12;i++){
        dados[dia].push({
            c:i,
            manha:"",
            tarde:"",
            onM:false,
            onT:false
        });
    }
});

// carregar
function carregar(){
    let s=localStorage.getItem("agenda");
    if(s) dados=JSON.parse(s);
}

// salvar
function salvar(){
    localStorage.setItem("agenda",JSON.stringify(dados));
}

// toggle ON/OFF
function toggle(dia,i,tipo){

if(tipo==="M") dados[dia][i].onM=!dados[dia][i].onM;
if(tipo==="T") dados[dia][i].onT=!dados[dia][i].onT;

salvar();
render();

}

// render
function render(){

let html="";

dias.forEach(dia=>{

html+=`
<div class="caixa">
<h2>${dia.toUpperCase()}</h2>

<div class="grid">
`;

dados[dia].forEach((d,i)=>{

html+=`
<div class="item">

<div class="numero">Consultório ${d.c}</div>

<b>Manhã:</b>
<input value="${d.manha}"
onchange="dados['${dia}'][${i}].manha=this.value;salvar()">
<span class="${d.onM?'on':'off'}">
${d.onM?'🟢 ON':'🔴 OFF'}
</span>
<br>
<button class="${d.onM?'btnOff':'btnOn'}"
onclick="toggle('${dia}',${i},'M')">
${d.onM?'Desligar':'Ligar'}
</button>

<br><br>

<b>Tarde:</b>
<input value="${d.tarde}"
onchange="dados['${dia}'][${i}].tarde=this.value;salvar()">
<span class="${d.onT?'on':'off'}">
${d.onT?'🟢 ON':'🔴 OFF'}
</span>
<br>
<button class="${d.onT?'btnOff':'btnOn'}"
onclick="toggle('${dia}',${i},'T')">
${d.onT?'Desligar':'Ligar'}
</button>

</div>
`;

});

html+=`
</div>
</div>
`;

});

document.getElementById("conteudo").innerHTML=html;

}

setInterval(relogio,1000);

carregar();
render();
relogio();

</script>

</body>
</html>
