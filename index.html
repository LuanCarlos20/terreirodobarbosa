<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel dos Consultórios</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f9;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:30px;
    color:#333;
}

.container{
    max-width:1100px;
    margin:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

th{
    background:#0d6efd;
    color:#fff;
    padding:15px;
}

td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

input{
    width:100%;
    padding:8px;
    border:1px solid #ccc;
    border-radius:5px;
    text-align:center;
}

.status{
    color:#fff;
    padding:8px 15px;
    border-radius:20px;
    font-weight:bold;
    display:inline-block;
    min-width:80px;
}

.on{
    background:#28a745;
}

.off{
    background:#dc3545;
}

button{
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

.salvar{
    background:#0d6efd;
    color:white;
}

.alternar{
    background:#ff9800;
    color:white;
}

button:hover{
    opacity:.9;
}

footer{
    text-align:center;
    margin-top:20px;
    color:#666;
}
</style>

</head>
<body>

<div class="container">

<h1>Painel dos Consultórios</h1>

<table>

<thead>
<tr>
<th>Consultório</th>
<th>Nome do Médico</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

<footer>
Sistema de Controle de Consultórios
</footer>

</div>

<script>

const quantidade = 12;

let consultorios = JSON.parse(localStorage.getItem("consultorios"));

if(!consultorios){

consultorios=[];

for(let i=1;i<=quantidade;i++){

consultorios.push({
numero:i,
medico:"Médico "+i,
status:true
});

}

salvar();

}

function salvar(){

localStorage.setItem("consultorios",JSON.stringify(consultorios));

}

function carregar(){

const tabela=document.getElementById("tabela");

tabela.innerHTML="";

consultorios.forEach((c,index)=>{

const linha=document.createElement("tr");

linha.innerHTML=`

<td><b>${String(c.numero).padStart(2,"0")}</b></td>

<td>

<input
value="${c.medico}"
id="medico${index}"
>

</td>

<td>

<span class="status ${c.status?"on":"off"}">

${c.status?"🟢 ON":"🔴 OFF"}

</span>

</td>

<td>

<button class="salvar"
onclick="salvarNome(${index})">

Salvar Nome

</button>

<button class="alternar"
onclick="trocarStatus(${index})">

Alterar Status

</button>

</td>

`;

tabela.appendChild(linha);

});

}

function salvarNome(index){

const nome=document.getElementById("medico"+index).value;

consultorios[index].medico=nome;

salvar();

alert("Nome atualizado!");

}

function trocarStatus(index){

consultorios[index].status=!consultorios[index].status;

salvar();

carregar();

}

carregar();

</script>

</body>
</html>
