<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Consultórios</title>

<style>
body{
    font-family:Arial;
    margin:0;
    padding:20px;
    background:#eef2f7;
}

.topo{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

h1{
    color:#0d6efd;
    margin:0;
}

#relogio{
    background:#000;
    color:#0f0;
    padding:10px 20px;
    border-radius:10px;
    font-size:20px;
    font-weight:bold;
}

#data{
    color:#555;
    margin-top:5px;
    font-size:14px;
}

.caixa{
    background:#fff;
    padding:15px;
    margin-top:20px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

h2{
    margin:0 0 10px 0;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.item{
    background:#f4f4f4;
    padding:10px;
    border-radius:8px;
}

label{
    font-size:12px;
    color:#666;
}

input{
    width:100%;
    padding:6px;
    margin-top:3px;
    margin-bottom:8px;
    border:1px solid #ccc;
    border-radius:5px;
}

</style>
</head>

<body>

<div class="topo">
    <div>
        <h1>Painel Consultórios</h1>
        <div id="data"></div>
    </div>
    <div id="relogio"></div>
</div>

<div id="conteudo"></div>

<script>

function relogio(){
    const d=new Date();
    document.getElementById("relogio").innerHTML=d.toLocaleTimeString();
    document.getElementById("data").innerHTML=
    d.toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"2-digit",year:"numeric"});
}

// CONSULTÓRIOS 3 A 12
let dados=[
{c:3,manha:"",tarde:""},
{c:4,manha:"",tarde:""},
{c:5,manha:"",tarde:""},
{c:6,manha:"",tarde:""},
{c:7,manha:"",tarde:""},
{c:8,manha:"",tarde:""},
{c:9,manha:"",tarde:""},
{c:10,manha:"",tarde:""},
{c:11,manha:"",tarde:""},
{c:12,manha:"",tarde:""}
];

// carregar localStorage
function carregar(){
    let s=localStorage.getItem("consultorios");
    if(s) dados=JSON.parse(s);
}

// salvar localStorage
function salvar(){
    localStorage.setItem("consultorios",JSON.stringify(dados));
}

// renderizar tela
function render(){

let html="";

html+=`
<div class="caixa">
<h2>CONSULTÓRIOS (MANHÃ / TARDE)</h2>

<div class="grid">
`;

dados.forEach((d,i)=>{

html+=`
<div class="item">

<b>Consultório ${d.c}</b>

<br><br>

<label>Manhã</label>
<input value="${d.manha}" onchange="dados[${i}].manha=this.value;salvar()">

<label>Tarde</label>
<input value="${d.tarde}" onchange="dados[${i}].tarde=this.value;salvar()">

</div>
`;

});

html+=`
</div>
</div>
`;

document.getElementById("conteudo").innerHTML=html;
}

setInterval(relogio,1000);

carregar();
render();
relogio();

</script>

</body>
</html>
