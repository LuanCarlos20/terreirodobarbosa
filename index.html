<!DOCTYPE html>
<html lang="pt-br">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8f5f2; }
        h1, h2, .font-serif { font-family: 'Playfair Display', serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }

        .header-bg {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.7)), 
                        url('https://i.imgur.com/3aqQGlJ.jpeg');
            background-size: cover; background-position: center;
        }

        #splash-screen {
            position: fixed; inset: 0; background: #2d1610; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease-out, visibility 0.8s;
        }

        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .animate-pulse-green { animation: pulse-green 2s infinite; border-color: #22c55e !important; }
        .animate-pulse-red { animation: pulse-red 2s infinite; border-color: #ef4444 !important; }
        .payment-btn.active { background-color: #5d2906 !important; color: white !important; border-color: #5d2906 !important; }
        
        .banner-container { 
            width: 85%; max-width: 280px; height: 90px; margin: 15px auto; 
            overflow: hidden; border-radius: 12px; position: relative; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }
        .banner-wrapper { display: flex; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; }
        .banner-slide { min-width: 100%; height: 100%; position: relative; }
        .banner-slide img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="text-stone-900 pb-44">

        <h2 class="text-white text-2xl font-bold uppercase tracking-[0.2em]">Terreiro do Barbosa</h2>
    </div>

    <div class="banner-container">

        <button onclick="filterCategory('cervejas')" class="cat-btn px-6 py-2 rounded-xl bg-stone-100 text-stone-500 text-xs font-bold uppercase">Cervejas</button>
        <button onclick="filterCategory('drinks')" class="cat-btn px-6 py-2 rounded-xl bg-stone-100 text-stone-500 text-xs font-bold uppercase">Drinks</button>
    </nav>

    <div class="max-w-4xl mx-auto px-4 mt-6">

    </div>

    <main class="max-w-4xl mx-auto p-4 grid grid-cols-1 md:grid-cols-2 gap-4" id="menu-container"></main>

    <div id="admin-modal" class="fixed inset-0 bg-black/90 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-md">

            <button onclick="closeAdmin()" class="w-full bg-orange-950 text-white font-bold py-4 rounded-2xl mt-4 uppercase">Salvar Tudo</button>
        </div>
    </div>

    <div id="item-modal" class="fixed inset-0 bg-black/80 z-[70] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2rem] p-8 relative">
            <button onclick="closeModal()" class="absolute top-4 right-6 text-stone-300 text-3xl">&times;</button>
            <h2 id="modal-item-title" class="font-bold text-2xl uppercase text-stone-800 mb-1"></h2>
            <div id="modal-item-price" class="text-xl font-black text-green-600 mb-6"></div>
            <textarea id="item-obs" class="w-full border-2 border-stone-50 rounded-xl p-4 h-24 outline-none focus:border-orange-900 bg-stone-50/50" placeholder="Observações..."></textarea>
            <div class="flex items-center justify-center my-6 gap-8">
                <button onclick="updateQty(-1)" class="bg-stone-100 w-12 h-12 rounded-xl font-bold">-</button>
                <div id="item-qty" class="text-xl font-black">1</div>
                <button onclick="updateQty(1)" class="bg-stone-100 w-12 h-12 rounded-xl font-bold">+</button>
            </div>
            <button onclick="confirmItem()" class="w-full bg-orange-950 text-white font-bold py-4 rounded-xl uppercase">Adicionar</button>
        </div>
    </div>

    <footer class="fixed bottom-0 w-full bg-white/95 backdrop-blur-md border-t p-4 z-50 shadow-lg">

            </div>
            <button onclick="toggleCartModal(true)" class="bg-orange-950 text-white px-8 py-4 rounded-2xl font-bold">Ver Pedido</button>
        </div>
    </footer>

    <div id="cart-modal" class="fixed inset-0 bg-black/80 z-[60] hidden flex items-center justify-center p-4">

            <button onclick="toggleCartModal(false)" class="absolute top-5 right-6 text-stone-300 text-4xl">&times;</button>
            <h2 class="text-xl font-bold mb-4 border-b pb-2">Meu Pedido</h2>
            <div id="cart-items" class="flex-1 overflow-y-auto space-y-2 mb-4 scrollbar-hide"></div>
            <select id="delivery-location" onchange="updateCartUI()" class="w-full rounded-xl p-4 bg-stone-50 border-2 border-stone-100 font-bold mb-4"></select>
            <div class="grid grid-cols-3 gap-2 mb-4">

                <button onclick="setPayment('Dinheiro')" id="pay-Dinheiro" class="payment-btn border py-2 rounded-lg text-[10px] font-bold">DINHEIRO</button>

            <button onclick="sendOrder()" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl">Enviar WhatsApp</button>

        const TAXAS = [
            { b: "Centro", t: 3 }, { b: "Cirolândia", t: 4 }, { b: "Malvinas", t: 5 },
            { b: "Bulandeira", t: 4 }, { b: "Vila Santo Antonio", t: 5 }, { b: "Caldas", t: 6 },
            { b: "Arajara", t: 10 }, { b: "Retirada/Na Mesa", t: 0 }
        ];

        let cart = [];
        let curItem = null;
        let paymentMethod = "";

        window.onload = () => {
            checkStatus(); renderMenu(); renderTaxas(); initBanner();
            setTimeout(() => { document.getElementById('splash-screen').style.display = 'none'; }, 2000);
        };

        function openAdmin() {
            const pass = prompt("Senha:");
            if(pass === "1234") {
                const list = document.getElementById('admin-list');
                list.innerHTML = PRODUTOS.map(p => `
                    <div class="flex items-center justify-between p-2 border-b">
                        <span class="text-[10px] font-bold uppercase truncate w-40">${p.name}</span>
                        <input type="number" step="0.50" value="${p.price}" onchange="updatePrice(${p.id}, this.value)" class="w-16 p-1 border rounded text-center">
                    </div>
                `).join('');
                document.getElementById('admin-modal').classList.remove('hidden');
            }
        }

        function updatePrice(id, val) { PRODUTOS.find(x => x.id === id).price = parseFloat(val); renderMenu(); }
        function closeAdmin() { document.getElementById('admin-modal').classList.add('hidden'); }

        function checkStatus() {
            const now = new Date(); const dia = now.getDay(); const hora = now.getHours();
            let aberto = false;
            if(dia === 5 && hora >= 16) aberto = true;
            if((dia === 6 || dia === 0) && hora >= 12 && hora < (dia === 0 ? 22 : 23.9)) aberto = true;

            const div = document.getElementById('status-loja');
            const txt = document.getElementById('status-texto');
            if(aberto) {
                div.className = "mt-2 text-white px-5 py-1 rounded-full text-[10px] font-black flex items-center bg-green-600 animate-pulse-green mx-auto w-fit";
                txt.innerText = "Aberto Agora";
            } else {
                div.className = "mt-2 text-white px-5 py-1 rounded-full text-[10px] font-black flex items-center bg-red-600 mx-auto w-fit";
                txt.innerText = "Fechado";
            }
        }

        function renderMenu(cat = 'todas') {
            const term = document.getElementById('search-input').value.toLowerCase();
            const container = document.getElementById('menu-container');
            const filtered = PRODUTOS.filter(p => (cat === 'todas' || p.cat === cat) && p.name.toLowerCase().includes(term));
            container.innerHTML = filtered.map(p => `
                <div onclick="openItemModal(${p.id})" class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center cursor-pointer">
                    <div class="text-left"><h3 class="font-bold text-xs uppercase">${p.name}</h3><p class="font-black text-orange-900 mt-1">R$ ${p.price.toFixed(2)}</p></div>
                    <div class="bg-stone-50 w-10 h-10 rounded-xl flex items-center justify-center border"><i class="fa fa-plus text-xs"></i></div>
                </div>`).join('');
        }

        function openItemModal(id) {
            const p = PRODUTOS.find(x => x.id === id);
            curItem = {...p, qty: 1};
            document.getElementById('modal-item-title').innerText = p.name;
            document.getElementById('modal-item-price').innerText = `R$ ${p.price.toFixed(2)}`;
            document.getElementById('item-qty').innerText = "1";
            document.getElementById('item-modal').classList.remove('hidden');
        }

        function updateQty(v) { curItem.qty = Math.max(1, curItem.qty + v); document.getElementById('item-qty').innerText = curItem.qty; }
        function confirmItem() { cart.push({...curItem, obs: document.getElementById('item-obs').value, finalPrice: curItem.price * curItem.qty}); updateCartUI(); closeModal(); }
        function closeModal() { document.getElementById('item-modal').classList.add('hidden'); }
        function toggleCartModal(s) { document.getElementById('cart-modal').classList.toggle('hidden', !s); }

        function updateCartUI() {
            const fee = parseFloat(document.getElementById('delivery-location').selectedOptions[0]?.getAttribute('data-fee') || 0);
            const sub = cart.reduce((acc, cur) => acc + cur.finalPrice, 0);
            document.getElementById('cart-total').innerText = `R$ ${(sub + fee).toFixed(2)}`;
            document.getElementById('cart-items').innerHTML = cart.map((item, i) => `
                <div class="flex justify-between items-center bg-stone-50 p-3 rounded-lg border">
                    <div class="text-left font-bold text-[10px] uppercase">${item.qty}x ${item.name} - R$ ${item.finalPrice.toFixed(2)}</div>
                    <button onclick="removeItem(${i})" class="text-red-500 px-2">X</button>
                </div>`).join('');
        }

        function removeItem(i) { cart.splice(i, 1); updateCartUI(); }
        function setPayment(m) { paymentMethod = m; document.querySelectorAll('.payment-btn').forEach(b => b.classList.remove('bg-orange-950', 'text-white')); document.getElementById(`pay-${m === 'Cartão' ? 'Cartao' : m}`).classList.add('bg-orange-950', 'text-white'); }
        function renderTaxas() { document.getElementById('delivery-location').innerHTML = `<option data-fee="0">Local de Entrega...</option>` + TAXAS.map(t => `<option value="${t.b}" data-fee="${t.t}">${t.b} - R$ ${t.t.toFixed(2)}</option>`).join(''); }
        function filterCategory(cat) { renderMenu(cat); }
        function searchProduct() { renderMenu(); }
        function sendOrder() {
            const name = document.getElementById('cust-name').value;
            if(!cart.length || !name || !paymentMethod) return alert("Complete os dados!");
            let msg = `*🍺 TERREIRO DO BARBOSA*\n👤 *Cliente:* ${name}\n💳 *Pagamento:* ${paymentMethod}\n📍 *Local:* ${document.getElementById('delivery-location').value}\n----------------------------\n`;
            cart.forEach(i => msg += `*${i.qty}x ${i.name.toUpperCase()}* - R$ ${i.finalPrice.toFixed(2)}\n${i.obs ? `_Obs: ${i.obs}_\n` : ''}\n`);
            msg += `----------------------------\n*TOTAL: ${document.getElementById('cart-total').innerText}*`;
            window.open(`https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodeURIComponent(msg)}`);
        }
        function initBanner() { const slider = document.getElementById('banner-slider'); let i = 0; setInterval(() => { i = (i + 1) % 3; slider.style.transform = `translateX(-${i * 100}%)`; }, 4000); }
    </script>
</body>
</html>
