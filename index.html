<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Consultórios</title>

<style>
body{
    font-family:Arial;
    margin:0;
    padding:20px;
    background:#eef2f7;
}

.topo{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

h1{
    margin:0;
    color:#0d6efd;
}

#relogio{
    background:#000;
    color:#0f0;
    padding:10px 20px;
    border-radius:10px;
    font-weight:bold;
}

#data{
    color:#555;
    margin-top:5px;
}

.menu{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.menu button{
    padding:10px;
    border:none;
    cursor:pointer;
    border-radius:5px;
    background:#ddd;
    font-weight:bold;
}

.menu button.ativo{
    background:#0d6efd;
    color:#fff;
}

.caixa{
    background:#fff;
    margin-top:20px;
    padding:15px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.item{
    background:#f4f4f4;
    padding:10px;
    border-radius:8px;
}

.numero{
    font-weight:bold;
}

input{
    width:100%;
    padding:6px;
    margin-top:3px;
}

.status{
    font-weight:bold;
}

.on{color:green;}
.off{color:red;}

button.toggle{
    margin-top:5px;
    padding:6px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    color:white;
}

.onBtn{background:#28a745;}
.offBtn{background:#dc3545;}
</style>
</head>

<body>

<div class="topo">
    <div>
        <h1>Painel Consultórios</h1>
        <div id="data"></div>
    </div>
    <div id="relogio"></div>
</div>

<div class="menu" id="menu"></div>

<div id="conteudo"></div>

<script>

function relogio(){
    const d=new Date();
    document.getElementById("relogio").innerHTML=d.toLocaleTimeString();
    document.getElementById("data").innerHTML=
    d.toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"2-digit",year:"numeric"});
}

// dias
let dias=["segunda","terca","quarta","quinta","sexta"];
let atual="segunda";

// dados
let dados={};

function init(){
    dias.forEach(d=>{
        dados[d]=[];
        for(let i=3;i<=12;i++){
            dados[d].push({
                c:i,
                manha:"",
                tarde:"",
                onM:false,
                onT:false
            });
        }
    });
}

// salvar
function salvar(){
    localStorage.setItem("agendaTabs",JSON.stringify(dados));
}

// carregar
function carregar(){
    let s=localStorage.getItem("agendaTabs");
    if(s) dados=JSON.parse(s);
}

// toggle
function toggle(dia,i,tipo){
    if(tipo==="M") dados[dia][i].onM=!dados[dia][i].onM;
    if(tipo==="T") dados[dia][i].onT=!dados[dia][i].onT;
    salvar();
    render();
}

// mudar dia
function mudar(d){
    atual=d;
    render();
}

// menu
function menu(){
    let html="";
    dias.forEach(d=>{
        html+=`
        <button class="${atual===d?'ativo':''}" onclick="mudar('${d}')">
        ${d.toUpperCase()}
        </button>
        `;
    });
    document.getElementById("menu").innerHTML=html;
}

// render
function render(){

menu();

let html="";

html+=`
<div class="caixa">
<h2>${atual.toUpperCase()}</h2>

<div class="grid">
`;

dados[atual].forEach((d,i)=>{

html+=`
<div class="item">

<div class="numero">Consultório ${d.c}</div>

<b>Manhã</b>
<input value="${d.manha}"
onchange="dados['${atual}'][${i}].manha=this.value;salvar()">
<span class="${d.onM?'on':'off'}">
${d.onM?'🟢 ON':'🔴 OFF'}
</span>
<br>
<button class="toggle ${d.onM?'offBtn':'onBtn'}"
onclick="toggle('${atual}',${i},'M')">
${d.onM?'Desligar':'Ligar'}
</button>

<br><br>

<b>Tarde</b>
<input value="${d.tarde}"
onchange="dados['${atual}'][${i}].tarde=this.value;salvar()">
<span class="${d.onT?'on':'off'}">
${d.onT?'🟢 ON':'🔴 OFF'}
</span>
<br>
<button class="toggle ${d.onT?'offBtn':'onBtn'}"
onclick="toggle('${atual}',${i},'T')">
${d.onT?'Desligar':'Ligar'}
</button>

</div>
`;

});

html+=`
</div>
</div>
`;

document.getElementById("conteudo").innerHTML=html;

}

setInterval(relogio,1000);

init();
carregar();
render();
relogio();

</script>

</body>
</html>
