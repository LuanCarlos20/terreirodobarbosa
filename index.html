        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8f5f2; }
        h1, h2, .font-serif { font-family: 'Playfair Display', serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }

        .header-bg {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.7)), 
                        url('https://i.imgur.com/3aqQGlJ.jpeg');
            background-size: cover;
            background-position: center;
        }

        #splash-screen {
            position: fixed; inset: 0; background: #2d1610; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease-out, visibility 0.8s;
        }

        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .animate-pulse-green { animation: pulse-green 2s infinite; border-color: #22c55e !important; }
        .animate-pulse-red { animation: pulse-red 2s infinite; border-color: #ef4444 !important; }
        .payment-btn.active { background-color: #5d2906 !important; color: white !important; border-color: #5d2906 !important; }
        
        .product-img { width: 80px; height: 80px; border-radius: 1rem; object-fit: cover; }

        .banner-container { width: 100%; max-width: 400px; height: 150px; margin: 15px auto; overflow: hidden; border-radius: 20px; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        .banner-slide { min-width: 100%; height: 100%; position: relative; }
        .banner-slide img { width: 100%; height: 100%; object-fit: cover; }
        .banner-text { position: absolute; bottom: 10px; left: 15px; color: white; font-weight: bold; font-size: 14px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    </style>
</head>

            { bairro: "Bulandeira", taxa: 4.00 }, { bairro: "Vila Santo Antonio", taxa: 5.00 }, { bairro: "Caldas", taxa: 6.00 },

        let curItem = null;

        window.onload = () => {
            checkStatus();

            initBanner();
            setTimeout(() => { 
                document.getElementById('splash-screen').style.opacity = '0'; 
                setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 800); 
            }, 2500);

        // ADMIN DE PREÇOS
        function openAdmin() {
            const pass = prompt("Senha Administrativa:");
            if(pass === "1234") {
                const list = document.getElementById('admin-list');
                list.innerHTML = PRODUTOS.map(p => `
                    <div class="flex items-center justify-between p-3 border-b">
                        <span class="text-[10px] font-bold uppercase truncate w-48">${p.name}</span>
                        <input type="number" step="0.50" value="${p.price}" onchange="updatePrice(${p.id}, this.value)" class="w-20 p-1 border rounded text-center font-bold">
                    </div>
                `).join('');
                document.getElementById('admin-modal').classList.remove('hidden');
            }

        function updatePrice(id, val) { PRODUTOS.find(x => x.id === id).price = parseFloat(val); renderMenu(); }
        function closeAdmin() { document.getElementById('admin-modal').classList.add('hidden'); }

        // STATUS AUTOMÁTICO
        function checkStatus() {
            const agora = new Date(); const dia = agora.getDay(); const hora = agora.getHours();
            let aberto = false; let horarioInfo = "";
            const diasSemana = ["Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"];

            if (dia === 5) { horarioInfo = "16:00 às 00:00"; if (hora >= 16) aberto = true; }
            else if (dia === 6) { horarioInfo = "12:00 às 00:00"; if (hora >= 12) aberto = true; }
            else if (dia === 0) { horarioInfo = "12:00 às 22:00"; if (hora >= 12 && hora < 22) aberto = true; }
            else { horarioInfo = "Fechado Hoje"; }

            document.getElementById('horario-texto').innerText = `${diasSemana[dia]} • ${horarioInfo}`;
            const div = document.getElementById('status-loja');
            const logo = document.getElementById('logo-loja');
            const txt = document.getElementById('status-texto');

            if(aberto) {
                div.className = "mt-2 text-white px-5 py-1 rounded-full text-[10px] font-black flex items-center bg-green-600 animate-pulse-green mx-auto w-fit";
                logo.className = "w-24 h-24 rounded-full object-cover border-4 animate-pulse-green mx-auto mb-3 shadow-2xl";
                txt.innerText = "Aberto Agora";
            } else {
                div.className = "mt-2 text-white px-5 py-1 rounded-full text-[10px] font-black flex items-center bg-red-600 mx-auto w-fit";
                logo.className = "w-24 h-24 rounded-full object-cover border-4 border-red-500 mx-auto mb-3 shadow-2xl";
                txt.innerText = "Fechado";
            }
        }

        function initBanner() {
            const slider = document.getElementById('banner-slider');
            let index = 0;
            setInterval(() => { index = (index + 1) % 3; slider.style.transform = `translateX(-${index * 100}%)`; }, 4000);
        }

        function renderMenu(cat = 'todas') {
            const container = document.getElementById('menu-container');
            const search = document.getElementById('search-input').value.toLowerCase();
            const filtered = PRODUTOS.filter(p => (cat === 'todas' || p.cat === cat) && p.name.toLowerCase().includes(search));
            
            container.innerHTML = filtered.map(p => `
                <div onclick="openItemModal(${p.id})" class="bg-white p-4 rounded-3xl shadow-sm border-2 border-transparent flex justify-between items-center cursor-pointer active:scale-95 transition-all">
                    <div class="text-left flex-1 pr-4">
                        <h3 class="font-bold text-sm uppercase text-stone-700 tracking-tight">${p.name}</h3>
                        <p class="text-[10px] text-stone-400 mt-1 line-clamp-1">${p.desc}</p>
                        <p class="font-black text-orange-900 text-lg mt-2">R$ ${p.price.toFixed(2)}</p>
                    </div>
                    <div class="bg-stone-50 w-12 h-12 rounded-2xl flex items-center justify-center text-orange-950 border border-stone-100"><i class="fa fa-plus text-sm"></i></div>
                </div>`).join('');
        }

        function openItemModal(id) {
            const p = PRODUTOS.find(x => x.id === id);
            curItem = {...p, qty: 1};
            document.getElementById('modal-item-title').innerText = p.name;
            document.getElementById('modal-item-price').innerText = `R$ ${p.price.toFixed(2)}`;
            document.getElementById('item-qty').innerText = "1";
            document.getElementById('item-obs').value = "";
            document.getElementById('item-modal').classList.remove('hidden');
        }

        function updateQty(v) {
            curItem.qty = Math.max(1, curItem.qty + v);
            document.getElementById('item-qty').innerText = curItem.qty;
            document.getElementById('modal-item-price').innerText = `R$ ${(curItem.price * curItem.qty).toFixed(2)}`;
        }

        function confirmItem() {
            const obs = document.getElementById('item-obs').value.trim();
            cart.push({...curItem, obs: obs, finalPrice: curItem.price * curItem.qty});
            updateCartUI(); closeModal();
        }

        function updateCartUI() {
            const select = document.getElementById('delivery-location');
            const fee = parseFloat(select.options[select.selectedIndex]?.getAttribute('data-fee') || 0);
            const sub = cart.reduce((acc, cur) => acc + cur.finalPrice, 0);
            document.getElementById('cart-total').innerText = `R$ ${(sub + fee).toFixed(2)}`;
            document.getElementById('cart-items').innerHTML = cart.map((item, i) => `
                <div class="flex justify-between items-center bg-stone-50 p-4 rounded-2xl border">
                    <div class="text-left">
                        <p class="font-black text-xs uppercase">${item.qty}x ${item.name}</p>
                        ${item.obs ? `<p class="text-[10px] text-orange-800 italic">"${item.obs}"</p>` : ''}
                    </div>
                    <button onclick="removeItem(${i})" class="text-red-400"><i class="fa fa-trash-alt"></i></button>
                </div>`).join('');
        }

        function sendOrder() {
            const name = document.getElementById('cust-name').value;
            const delivery = document.getElementById('delivery-location').value;
            if(!cart.length || !name || !paymentMethod || delivery === "0") return alert("Preencha tudo!");
            let msg = `*🍺 TERREIRO DO BARBOSA*\n👤 *Cliente:* ${name}\n💳 *Pagamento:* ${paymentMethod}\n📍 *Local:* ${delivery}\n----------------------------\n`;
            cart.forEach(i => msg += `*${i.qty}x ${i.name.toUpperCase()}* ${i.obs ? `(${i.obs})` : ''}\n`);
            msg += `----------------------------\n*TOTAL: ${document.getElementById('cart-total').innerText}*`;
            window.open(`https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodeURIComponent(msg)}`);
        }

        function closeModal() { document.getElementById('item-modal').classList.add('hidden'); }
        function toggleCartModal(s) { document.getElementById('cart-modal').classList.toggle('hidden', !s); }
        function removeItem(i) { cart.splice(i, 1); updateCartUI(); }
        
        function filterCategory(cat) { 
            renderMenu(cat);
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.className = "cat-btn px-6 py-2 rounded-xl bg-stone-100 text-stone-50 text-stone-500 text-xs font-bold uppercase tracking-wider";
            });
            event.currentTarget.className = "cat-btn px-6 py-2 rounded-xl bg-orange-950 text-white text-xs font-bold uppercase tracking-wider shadow-md";
        }

        function searchProduct() { renderMenu('todas'); }

        function renderDeliveryOptions() {
            const select = document.getElementById('delivery-location');
            TAXAS_ENTREGA.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.bairro;
                opt.setAttribute('data-fee', t.taxa);
                opt.innerText = `${t.bairro} - R$ ${t.taxa.toFixed(2)}`;
                select.appendChild(opt);
            });
        }

        function setPayment(m) { 
            paymentMethod = m; 
            document.querySelectorAll('.payment-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`pay-${m === 'Cartão' ? 'Cartao' : m}`).classList.add('active');
        }

        function shareMenu() {
            if (navigator.share) navigator.share({ title: 'Terreiro do Barbosa', url: window.location.href });
        }
    </script>
</body>
</html>
