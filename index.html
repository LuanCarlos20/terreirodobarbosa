<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terreiro do Barbosa - Cardápio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8f5f2; }
        h1, h2, .font-serif { font-family: 'Playfair Display', serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }

        .header-bg {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.7)), 
                        url('https://i.imgur.com/3aqQGlJ.jpeg');
            background-size: cover;
            background-position: center;
        }

        /* Splash Screen */
        #splash-screen {
            position: fixed; inset: 0; background: #2d1610; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease-out, visibility 0.8s;
        }

        /* Animação do Círculo Vermelho Vinho */
        @keyframes pulse-wine {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(128, 0, 32, 0.7); border-color: #800020; }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(128, 0, 32, 0); border-color: #800020; }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(128, 0, 32, 0); border-color: #800020; }
        }

        .animate-wine { animation: pulse-wine 2s infinite; }
        
        /* Status Loja */
        @keyframes pulse-green {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .animate-pulse-green { animation: pulse-green 2s infinite; }
        .payment-btn.active { background-color: #5d2906 !important; color: white !important; border-color: #5d2906 !important; }
    </style>
</head>
<body class="text-stone-900 pb-44">

    <div id="splash-screen">
        <img src="https://i.imgur.com/zKOhMDm.jpeg" 
             class="w-40 h-40 rounded-full border-4 shadow-2xl mb-6 animate-wine" 
             style="border-color: #800020;">
        <div class="text-center">
            <p class="text-stone-300 uppercase tracking-[0.3em] text-[10px] mb-1">Bem-vindo ao</p>
            <h2 class="text-white text-2xl font-serif font-bold">Cardápio do Barbosa</h2>
        </div>
    </div>

    <header class="w-full h-[320px] header-bg relative flex flex-col items-center justify-center shadow-inner">
        <div class="absolute top-4 left-4 z-10">
            <button onclick="openAdmin()" class="bg-black/30 text-white w-10 h-10 rounded-full flex items-center justify-center backdrop-blur-md border border-white/20">
                <i class="fas fa-lock text-sm"></i>
            </button>
        </div>
        
        <div class="absolute top-4 right-4 flex gap-3 z-10">
            <button onclick="shareMenu()" class="bg-black/30 text-white w-10 h-10 rounded-full flex items-center justify-center backdrop-blur-md border border-white/20">
                <i class="fas fa-share-alt"></i>
            </button>
            <a href="https://www.instagram.com/terreiro_dobarbosa?igsh=MWlrNGNvZzFqd3p3aw==" target="_blank" class="bg-black/30 text-white w-10 h-10 rounded-full flex items-center justify-center backdrop-blur-md border border-white/20">
                <i class="fab fa-instagram"></i>
            </a>
        </div>

        <div class="text-center z-10 mt-6">
            <img id="logo-loja" src="https://i.imgur.com/zKOhMDm.jpeg" class="w-24 h-24 rounded-full object-cover border-4 shadow-2xl mx-auto mb-3 transition-all duration-500">
            <h1 class="text-white text-xl font-serif font-bold uppercase tracking-widest px-4">Terreiro do Barbosa</h1>
            <div class="flex flex-col items-center gap-2 mt-2">
                <div id="status-loja" class="text-white px-5 py-1 rounded-full text-[10px] font-black flex items-center justify-center mx-auto w-fit uppercase">
                    <span id="status-texto">Verificando...</span>
                </div>
                <div id="horario-texto" class="text-white/80 text-[10px] font-bold uppercase tracking-widest bg-black/20 px-3 py-1 rounded-full backdrop-blur-sm mt-1">
                    Sex: 16h-00h | Sáb e Dom: 12h-22h
                </div>
            </div>
        </div>
    </header>

    <nav class="sticky top-0 bg-white shadow-sm z-40 overflow-x-auto whitespace-nowrap p-4 flex gap-3 scrollbar-hide border-b border-stone-100">
        <button onclick="filterCategory('todas', event)" class="cat-btn px-6 py-2 rounded-xl bg-orange-950 text-white text-xs font-bold uppercase tracking-wider shadow-md">Todas</button>
        <button onclick="filterCategory('entradas', event)" class="cat-btn px-6 py-2 rounded-xl bg-stone-100 text-stone-500 text-xs font-bold uppercase tracking-wider">Entradas</button>
        <button onclick="filterCategory('churrasco', event)" class="cat-btn px-6 py-2 rounded-xl bg-stone-100 text-stone-500 text-xs font-bold uppercase tracking-wider">Churrasco</button>
        <button onclick="filterCategory('principais', event)" class="cat-btn px-6 py-2 rounded-xl bg-stone-100 text-stone-500 text-xs font-bold uppercase tracking-wider">Pratos</button>
        <button onclick="filterCategory('bebidas', event)" class="cat-btn px-6 py-2 rounded-xl bg-stone-100 text-stone-500 text-xs font-bold uppercase tracking-wider">Bebidas</button>
        <button onclick="filterCategory('drinks', event)" class="cat-btn px-6 py-2 rounded-xl bg-stone-100 text-stone-500 text-xs font-bold uppercase tracking-wider">Drinks</button>
    </nav>

    <div class="max-w-4xl mx-auto px-4 mt-6">
        <div class="relative">
            <input type="text" id="search-input" oninput="searchProduct()" placeholder="Buscar no cardápio..." 
                   class="w-full bg-white border-2 border-stone-100 rounded-2xl py-4 pl-12 pr-4 outline-none focus:border-orange-800 transition-all shadow-sm font-medium">
            <i class="fa fa-search absolute left-5 top-1/2 -translate-y-1/2 text-stone-300"></i>
        </div>
    </div>

    <main class="max-w-4xl mx-auto p-4 grid grid-cols-1 md:grid-cols-2 gap-4" id="menu-container"></main>

    <footer class="fixed bottom-0 w-full bg-white/95 backdrop-blur-md border-t p-4 z-50 shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
        <div class="max-w-4xl mx-auto flex items-center justify-between mb-4">
            <div>
                <span class="text-[9px] text-stone-400 uppercase font-black tracking-widest">Total com Entrega</span>
                <p class="text-2xl font-black text-orange-950" id="cart-total">R$ 0,00</p>
            </div>
            <button onclick="toggleCartModal(true)" class="bg-orange-950 text-white px-8 py-4 rounded-2xl font-bold flex items-center gap-3 shadow-lg active:scale-95 transition-all">
                Pedido <i class="fa fa-receipt text-xs opacity-40"></i>
            </button>
        </div>
        <div class="text-center pt-3 border-t border-stone-100 flex justify-center items-center gap-4">
            <span class="text-[10px] font-black text-stone-400 uppercase tracking-tighter">Desenvolvido por @lu4ncarlos</span>
            <a href="https://www.instagram.com/lu4ncarlos" target="_blank" class="text-pink-600 text-lg hover:scale-110 transition-transform"><i class="fab fa-instagram"></i></a>
        </div>
    </footer>

    <div id="item-modal" class="fixed inset-0 bg-black/80 z-[70] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[2rem] p-8 shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-4 right-6 text-stone-300 text-3xl">&times;</button>
            <h2 id="modal-item-title" class="font-bold text-2xl uppercase text-stone-800 mb-1 pr-8">ITEM</h2>
            <div id="modal-item-price" class="text-xl font-black text-green-600 mb-6">R$ 0,00</div>
            <label class="font-bold text-[10px] text-stone-400 uppercase mb-2 block tracking-widest">Observações</label>
            <textarea id="item-obs" class="w-full border-2 border-stone-50 rounded-xl p-4 h-28 outline-none focus:border-orange-900 resize-none bg-stone-50/50" placeholder="Ex: Sem cebola..."></textarea>
            <div class="flex items-center justify-center mt-8 mb-8 gap-8">
                <button onclick="updateQty(-1)" class="bg-stone-100 w-14 h-14 rounded-2xl font-bold text-2xl">-</button>
                <div id="item-qty" class="text-2xl font-black w-6 text-center">1</div>
                <button onclick="updateQty(1)" class="bg-stone-100 w-14 h-14 rounded-2xl font-bold text-2xl">+</button>
            </div>
            <button onclick="confirmItem()" class="w-full bg-orange-950 text-white font-bold py-5 rounded-2xl uppercase tracking-widest shadow-xl">Adicionar</button>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black/80 z-[60] hidden flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] max-h-[90vh] flex flex-col p-6 shadow-2xl relative">
            <button onclick="toggleCartModal(false)" class="absolute top-5 right-6 text-stone-300 text-4xl">&times;</button>
            <h2 class="text-2xl font-serif font-bold mb-6 border-b pb-4">Meu Pedido</h2>
            <div id="cart-items" class="flex-1 overflow-y-auto space-y-3 pr-1 scrollbar-hide mb-6"></div>
            <div class="bg-stone-50 p-5 rounded-3xl border border-stone-100 mb-6 space-y-4">
                <select id="delivery-location" onchange="updateCartUI()" class="w-full rounded-xl p-4 bg-white border-2 border-stone-100 font-bold outline-none">
                    <option value="0" data-fee="0">Selecione o Bairro...</option>
                </select>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setPayment('Pix')" id="pay-Pix" class="payment-btn border-2 border-stone-100 rounded-xl py-3 text-[10px] font-bold uppercase transition-all">Pix</button>
                    <button onclick="setPayment('Cartão')" id="pay-Cartao" class="payment-btn border-2 border-stone-100 rounded-xl py-3 text-[10px] font-bold uppercase transition-all">Cartão</button>
                    <button onclick="setPayment('Dinheiro')" id="pay-Dinheiro" class="payment-btn border-2 border-stone-100 rounded-xl py-3 text-[10px] font-bold uppercase transition-all">Dinheiro</button>
                </div>
                <div id="change-container" class="hidden">
                    <input type="number" id="change-value" placeholder="Troco para quanto?" class="w-full border-2 border-stone-100 rounded-xl p-4 font-bold outline-none">
                </div>
                <input type="text" id="cust-name" placeholder="Seu Nome" class="w-full border-2 border-stone-100 rounded-xl p-4 font-bold outline-none">
                <input type="text" id="cust-address" placeholder="Endereço Completo (Rua, Nº, Ref)" class="w-full border-2 border-stone-100 rounded-xl p-4 font-bold outline-none">
            </div>
            <button onclick="sendOrder()" class="w-full bg-green-600 text-white font-bold py-5 rounded-2xl text-lg shadow-xl flex items-center justify-center gap-3">
                Enviar para o WhatsApp <i class="fab fa-whatsapp text-xl"></i>
            </button>
        </div>
    </div>

    <div id="admin-modal" class="fixed inset-0 bg-black/95 z-[80] hidden flex flex-col p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-white text-2xl font-bold">Gerenciar Preços</h2>
            <button onclick="closeAdmin()" class="text-white text-4xl">&times;</button>
        </div>
        <div id="admin-list" class="space-y-4 max-w-2xl mx-auto w-full pb-20"></div>
        <div class="fixed bottom-6 left-0 w-full px-6">
            <button onclick="saveAdminPrices()" class="w-full max-w-2xl mx-auto block bg-green-600 text-white font-bold py-4 rounded-xl shadow-2xl">SALVAR ALTERAÇÕES</button>
        </div>
    </div>

    <script>
        const WHATSAPP_NUMBER = "5588992791644";
        
        let PRODUTOS = [
            { id: 1, cat: 'entradas', name: "Batata frita", price: 16.00, desc: "Porção crocante tradicional" },
            { id: 2, cat: 'entradas', name: "Batata recheada", price: 20.00, desc: "Cheddar, queijo e bacon" },
            { id: 3, cat: 'entradas', name: "Macaxeira frita", price: 16.00, desc: "" },
            { id: 4, cat: 'entradas', name: "Macaxeira cozida", price: 16.00, desc: "" },
            { id: 5, cat: 'entradas', name: "Bolinha de queijo", price: 18.00, desc: "12 unidades" },
            { id: 6, cat: 'entradas', name: "Bolinha de carne de sol", price: 18.00, desc: "12 unidades" },
            { id: 7, cat: 'entradas', name: "Costela com barbecue", price: 18.00, desc: "12 unidades" },
            { id: 8, cat: 'entradas', name: "Pastelzinho carne de sol", price: 18.00, desc: "12 unidades" },
            { id: 9, cat: 'entradas', name: "Camarão empanado", price: 24.00, desc: "12 unidades" },
            { id: 10, cat: 'entradas', name: "Isca de peixe", price: 20.00, desc: "12 unidades" },
            { id: 11, cat: 'entradas', name: "Carne de sol", price: 40.00, desc: "Trinchada com cebola" },
            { id: 12, cat: 'entradas', name: "Tripa de porco", price: 25.00, desc: "" },
            { id: 13, cat: 'entradas', name: "Moela", price: 20.00, desc: "" },
            { id: 14, cat: 'entradas', name: "Asinha de frango", price: 25.00, desc: "" },
            { id: 15, cat: 'entradas', name: "Porco trinchado", price: 30.00, desc: "" },
            { id: 16, cat: 'entradas', name: "Filé com fritas", price: 40.00, desc: "" },
            { id: 17, cat: 'entradas', name: "Peixe frito", price: 55.00, desc: "" },
            { id: 18, cat: 'entradas', name: "Camarão alho e óleo", price: 40.00, desc: "" },
            { id: 19, cat: 'churrasco', name: "Picanha (200g)", price: 22.00, desc: "" },
            { id: 20, cat: 'churrasco', name: "Picanha nordestina (200g)", price: 26.00, desc: "" },
            { id: 21, cat: 'churrasco', name: "Maminha (200g)", price: 18.00, desc: "" },
            { id: 22, cat: 'churrasco', name: "Carneiro (200g)", price: 20.00, desc: "" },
            { id: 23, cat: 'churrasco', name: "Costela de porco (200g)", price: 16.00, desc: "" },
            { id: 24, cat: 'churrasco', name: "Filé de porco (200g)", price: 18.00, desc: "" },
            { id: 25, cat: 'churrasco', name: "Linguiça", price: 6.00, desc: "" },
            { id: 26, cat: 'churrasco', name: "Frango", price: 12.00, desc: "" },
            { id: 27, cat: 'churrasco', name: "Misto Completo", price: 55.00, desc: "Boi, Porco, Linguiça e Frango" },
            { id: 28, cat: 'principais', name: "Baião de dois", price: 14.00, desc: "" },
            { id: 29, cat: 'principais', name: "Baião cremoso", price: 20.00, desc: "" },
            { id: 30, cat: 'principais', name: "Feijoada completa", price: 30.00, desc: "Sáb e Dom" },
            { id: 31, cat: 'bebidas', name: "Coca-Cola 1L", price: 10.00, desc: "" },
            { id: 32, cat: 'bebidas', name: "Coca Zero 1L", price: 10.00, desc: "" },
            { id: 33, cat: 'bebidas', name: "Cajuína 1L", price: 10.00, desc: "" },
            { id: 34, cat: 'bebidas', name: "Guaraná 1L", price: 10.00, desc: "" },
            { id: 35, cat: 'bebidas', name: "Fanta 1L", price: 10.00, desc: "" },
            { id: 36, cat: 'bebidas', name: "Refrigerante Lata", price: 5.00, desc: "" },
            { id: 37, cat: 'bebidas', name: "Red Bull", price: 12.00, desc: "" },
            { id: 38, cat: 'bebidas', name: "TNT", price: 10.00, desc: "" },
            { id: 39, cat: 'bebidas', name: "Dose Ypióca", price: 4.00, desc: "" },
            { id: 48, cat: 'drinks', name: "Barbosa Gim", price: 20.00, desc: "" },
            { id: 53, cat: 'drinks', name: "Caipirinha Limão", price: 15.00, desc: "" },
            { id: 59, cat: 'bebidas', name: "Heineken 600ml", price: 15.00, desc: "" },
            { id: 65, cat: 'bebidas', name: "Água Mineral", price: 3.00, desc: "" }
        ];

        let TAXAS_ENTREGA = [
            { bairro: "Centro", taxa: 3.00 }, { bairro: "Cirolândia", taxa: 4.00 }, 
            { bairro: "Malvinas", taxa: 5.00 }, { bairro: "Bulandeira", taxa: 4.00 }, 
            { bairro: "Vila Santo Antonio", taxa: 5.00 }, { bairro: "Caldas", taxa: 6.00 },
            { bairro: "Arajara", taxa: 10.00 }, { bairro: "Retirada / Na Mesa", taxa: 0.00 }
        ];

        let cart = [];
        let curItem = null;
        let paymentMethod = "";

        window.onload = () => {
            loadAdminPrices();
            checkStatus();
            renderMenu();
            renderDeliveryOptions();
            setTimeout(() => { 
                document.getElementById('splash-screen').style.opacity = '0'; 
                setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 800); 
            }, 3500);
        };

        function checkStatus() {
            const agora = new Date();
            const dia = agora.getDay();
            const hora = agora.getHours();
            let aberto = (dia === 5 && hora >= 16) || (dia === 6 && hora >= 12) || (dia === 0 && hora >= 12 && hora < 22);

            const div = document.getElementById('status-loja');
            const txt = document.getElementById('status-texto');
            const logo = document.getElementById('logo-loja');
            
            if(aberto) {
                div.className = "text-white px-5 py-1 rounded-full text-[10px] font-black flex items-center bg-green-600 animate-pulse-green w-fit mx-auto";
                txt.innerText = "Aberto Agora";
                logo.className = "w-24 h-24 rounded-full object-cover border-4 shadow-2xl mx-auto mb-3 animate-pulse-green";
            } else {
                div.className = "text-white px-5 py-1 rounded-full text-[10px] font-black flex items-center bg-red-600 w-fit mx-auto";
                txt.innerText = "Fechado";
                logo.className = "w-24 h-24 rounded-full object-cover border-4 shadow-2xl mx-auto mb-3 border-red-600";
            }
        }

        function filterCategory(cat, event) { 
            renderMenu(cat);
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.className = "cat-btn px-6 py-2 rounded-xl bg-stone-100 text-stone-500 text-xs font-bold uppercase tracking-wider";
            });
            event.currentTarget.className = "cat-btn px-6 py-2 rounded-xl bg-orange-950 text-white text-xs font-bold uppercase tracking-wider shadow-md";
        }

        function renderMenu(cat = 'todas') {
            const container = document.getElementById('menu-container');
            const search = document.getElementById('search-input').value.toLowerCase();
            const filtered = PRODUTOS.filter(p => (cat === 'todas' || p.cat === cat) && p.name.toLowerCase().includes(search));
            container.innerHTML = filtered.map(p => `
                <div onclick="openItemModal(${p.id})" class="bg-white p-4 rounded-3xl shadow-sm border-2 border-transparent flex justify-between items-center cursor-pointer active:scale-95 transition-all">
                    <div class="text-left flex-1 pr-4">
                        <h3 class="font-bold text-[13px] uppercase text-stone-700">${p.name}</h3>
                        <p class="font-black text-orange-900 text-lg mt-1">R$ ${p.price.toFixed(2)}</p>
                    </div>
                    <div class="bg-stone-50 w-11 h-11 rounded-2xl flex items-center justify-center text-orange-950 border border-stone-100"><i class="fa fa-plus text-xs"></i></div>
                </div>`).join('');
        }

        function updateCartUI() {
            const select = document.getElementById('delivery-location');
            const fee = parseFloat(select.options[select.selectedIndex]?.getAttribute('data-fee') || 0);
            const sub = cart.reduce((acc, cur) => acc + cur.finalPrice, 0);
            document.getElementById('cart-total').innerText = `R$ ${(sub + fee).toFixed(2)}`;
            document.getElementById('cart-items').innerHTML = cart.map((item, i) => `
                <div class="flex justify-between items-center bg-stone-50 p-4 rounded-2xl border">
                    <div class="text-left">
                        <p class="font-black text-xs uppercase">${item.qty}x ${item.name}</p>
                    </div>
                    <button onclick="removeItem(${i})" class="text-red-400 p-2"><i class="fa fa-trash-alt"></i></button>
                </div>`).join('');
        }

        function sendOrder() {
            const name = document.getElementById('cust-name').value;
            const address = document.getElementById('cust-address').value;
            const delivery = document.getElementById('delivery-location').value;
            const change = document.getElementById('change-value').value;
            if(!cart.length || !name || !address || !paymentMethod || delivery === "0") return alert("Preencha Nome, Endereço, Bairro e Pagamento!");
            
            let msg = `*🍺 TERREIRO DO BARBOSA*\n👤 *Cliente:* ${name}\n🏠 *Endereço:* ${address}\n📍 *Bairro:* ${delivery}\n💳 *Pagamento:* ${paymentMethod}\n`;
            if(paymentMethod === 'Dinheiro' && change) msg += `💵 *Troco para:* R$ ${change}\n`;
            msg += `----------------------------\n`;
            cart.forEach(i => msg += `*${i.qty}x ${i.name.toUpperCase()}* ${i.obs ? `\n   _Obs: ${i.obs}_` : ''}\n`);
            msg += `----------------------------\n*TOTAL: ${document.getElementById('cart-total').innerText}*`;
            window.open(`https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodeURIComponent(msg)}`);
        }

        function openAdmin() { if(prompt("Senha:") === "123") { renderAdminList(); document.getElementById('admin-modal').classList.remove('hidden'); } }
        function renderAdminList() {
            document.getElementById('admin-list').innerHTML = PRODUTOS.map(p => `
                <div class="bg-white/10 p-4 rounded-xl flex justify-between items-center gap-4">
                    <span class="text-white text-[10px] uppercase font-bold flex-1">${p.name}</span>
                    <input type="number" step="0.5" data-id="${p.id}" value="${p.price}" class="admin-price-input w-24 bg-black text-white p-2 rounded border border-white/20 font-bold">
                </div>`).join('');
        }
        function saveAdminPrices() {
            const prices = {};
            document.querySelectorAll('.admin-price-input').forEach(input => {
                const id = parseInt(input.dataset.id);
                const val = parseFloat(input.value);
                prices[id] = val;
                const prod = PRODUTOS.find(p => p.id === id);
                if(prod) prod.price = val;
            });
            localStorage.setItem('barbosa_prices', JSON.stringify(prices));
            renderMenu(); closeAdmin(); alert("Preços salvos!");
        }
        function loadAdminPrices() {
            const saved = localStorage.getItem('barbosa_prices');
            if(saved) {
                const prices = JSON.parse(saved);
                PRODUTOS.forEach(p => { if(prices[p.id]) p.price = prices[p.id]; });
            }
        }
        function renderDeliveryOptions() {
            const select = document.getElementById('delivery-location');
            TAXAS_ENTREGA.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.bairro; opt.setAttribute('data-fee', t.taxa);
                opt.innerText = `${t.bairro} - Taxa: R$ ${t.taxa.toFixed(2)}`;
                select.appendChild(opt);
            });
        }
        function openItemModal(id) {
            const p = PRODUTOS.find(x => x.id === id);
            curItem = {...p, qty: 1};
            document.getElementById('modal-item-title').innerText = p.name;
            document.getElementById('modal-item-price').innerText = `R$ ${p.price.toFixed(2)}`;
            document.getElementById('item-qty').innerText = "1";
            document.getElementById('item-obs').value = "";
            document.getElementById('item-modal').classList.remove('hidden');
        }
        function updateQty(v) { curItem.qty = Math.max(1, curItem.qty + v); document.getElementById('item-qty').innerText = curItem.qty; document.getElementById('modal-item-price').innerText = `R$ ${(curItem.price * curItem.qty).toFixed(2)}`; }
        function confirmItem() { cart.push({...curItem, obs: document.getElementById('item-obs').value, finalPrice: curItem.price * curItem.qty}); updateCartUI(); closeModal(); }
        function closeModal() { document.getElementById('item-modal').classList.add('hidden'); }
        function toggleCartModal(s) { document.getElementById('cart-modal').classList.toggle('hidden', !s); }
        function removeItem(i) { cart.splice(i, 1); updateCartUI(); }
        function setPayment(m) { paymentMethod = m; document.querySelectorAll('.payment-btn').forEach(b => b.classList.remove('active')); document.getElementById(`pay-${m === 'Cartão' ? 'Cartao' : m}`).classList.add('active'); document.getElementById('change-container').classList.toggle('hidden', m !== 'Dinheiro'); }
        function closeAdmin() { document.getElementById('admin-modal').classList.add('hidden'); }
        function searchProduct() { renderMenu('todas'); }
        function shareMenu() { if (navigator.share) navigator.share({ title: 'Terreiro do Barbosa', url: window.location.href }); }
    </script>
</body>
</html>
