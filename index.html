<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Consultórios</title>

<style>
body{
    font-family:Arial;
    margin:0;
    padding:20px;
    background:#eef2f7;
}

.topo{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

h1{
    color:#0d6efd;
}

#relogio{
    background:#000;
    color:#0f0;
    padding:10px 20px;
    border-radius:10px;
    font-size:20px;
}

#data{
    color:#555;
    margin-top:5px;
}

.caixa{
    background:#fff;
    padding:15px;
    margin-top:20px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

h2{
    margin:0 0 10px 0;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:10px;
}

.item{
    background:#f4f4f4;
    padding:10px;
    border-radius:8px;
    font-size:14px;
}

.on{color:green;font-weight:bold;}
.off{color:red;font-weight:bold;}
</style>
</head>

<body>

<div class="topo">
    <div>
        <h1>Painel Consultórios</h1>
        <div id="data"></div>
    </div>
    <div id="relogio"></div>
</div>

<div id="conteudo"></div>

<script>

function atualizarRelogio(){
    const d=new Date();
    document.getElementById("relogio").innerHTML=d.toLocaleTimeString();
    document.getElementById("data").innerHTML=
        d.toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"2-digit",year:"numeric"});
}

function diaSemana(){
    return new Date().getDay(); // 1 = segunda
}

function render(){

let html="";
let dia=diaSemana();

// ================= SEGUNDA =================
if(dia===1){

html+=`

<div class="caixa">
<h2>SEGUNDA - MANHÃ</h2>
<div class="grid">

<div class="item">03 - Dra. Sofia <span class="on">ON</span></div>
<div class="item">04 - Carlos Neves <span class="on">ON</span></div>
<div class="item">05 - Ricardo Quidute <span class="on">ON</span></div>
<div class="item">06 - Ricardo Parente <span class="on">ON</span></div>
<div class="item">07 - LIVRE <span class="off">OFF</span></div>
<div class="item">08 - Dr. Samuel <span class="on">ON</span></div>
<div class="item">09 - LIVRE <span class="off">OFF</span></div>
<div class="item">10 - Dra. Renata Carvalho <span class="on">ON</span></div>
<div class="item">11 - Dra. Andrezza <span class="on">ON</span></div>
<div class="item">12 - LIVRE <span class="off">OFF</span></div>

</div>
</div>

<div class="caixa">
<h2>SEGUNDA - TARDE</h2>
<div class="grid">

<div class="item">03 - Dra. Sofia <span class="on">ON</span></div>
<div class="item">04 - LIVRE <span class="off">OFF</span></div>
<div class="item">05 - LIVRE <span class="off">OFF</span></div>
<div class="item">06 - LIVRE <span class="off">OFF</span></div>
<div class="item">07 - Dr. Hellen <span class="on">ON</span></div>
<div class="item">08 - LIVRE <span class="off">OFF</span></div>
<div class="item">09 - Dr. Yuri <span class="on">ON</span></div>
<div class="item">10 - Dra. Renata Carvalho <span class="on">ON</span></div>
<div class="item">11 - Dra. Andrezza <span class="on">ON</span></div>
<div class="item">12 - Dr. Vinicius <span class="on">ON</span></div>

</div>
</div>

`;

}

// ================= OUTROS DIAS =================
else{
html+=`
<div class="caixa">
<h2>TERÇA À SEXTA</h2>
<p>Agenda ainda não configurada.</p>
</div>
`;
}

document.getElementById("conteudo").innerHTML=html;
}

setInterval(()=>{
    atualizarRelogio();
    render();
},1000);

render();
atualizarRelogio();

</script>

</body>
</html>
