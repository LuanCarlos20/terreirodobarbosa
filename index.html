<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terreiro do Barbosa - Cardápio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8f5f2; }
        h1, h2, .font-serif { font-family: 'Playfair Display', serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }

        .header-bg {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.7)), 
                        url('https://i.imgur.com/3aqQGlJ.jpeg');
            background-size: cover; background-position: center;
        }

        #splash-screen {
            position: fixed; inset: 0; background: #2d1610; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease-out, visibility 0.8s;
        }

        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .animate-pulse-green { animation: pulse-green 2s infinite; border-color: #22c55e !important; }
        .payment-btn.active { background-color: #5d2906 !important; color: white !important; }

        /* Estilos do Banner Slider */
        .slider-container { overflow: hidden; border-radius: 1.5rem; position: relative; width: 100%; height: 180px; }
        .slider-wrapper { display: flex; transition: transform 0.5s ease-in-out; height: 100%; }
        .slide { min-width: 100%; height: 100%; position: relative; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .slide-caption { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); color: white; padding: 10px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body class="text-stone-900 pb-44">

    <div id="splash-screen">
        <img src="https://i.ibb.co/LzNfX6Xp/Whats-App-Image-2026-03-13-at-20-43-58.jpg" class="w-24 h-24 rounded-full border-4 border-yellow-700 mb-6 animate-bounce shadow-2xl">
        <h2 class="text-white text-2xl font-bold uppercase tracking-[0.2em]">Cardápio do Barbosa !</h2>
    </div>

    <header class="w-full h-[320px] header-bg relative flex flex-col items-center justify-center shadow-inner">
        <div class="absolute top-4 left-4 z-10">
            <button onclick="openAdmin()" class="bg-black/30 text-white w-10 h-10 rounded-full flex items-center justify-center backdrop-blur-md border border-white/20">
                <i class="fas fa-lock"></i>
            </button>
        </div>
        
        <div class="text-center z-10 mt-4">
            <img id="logo-loja" src="https://i.ibb.co/LzNfX6Xp/Whats-App-Image-2026-03-13-at-20-43-58.jpg" class="w-24 h-24 rounded-full object-cover border-4 border-transparent shadow-2xl mx-auto mb-3">
            <h1 class="text-white text-2xl font-serif font-bold uppercase tracking-widest px-4">Terreiro do Barbosa</h1>
            
            <div id="status-loja" class="mt-2 text-white px-5 py-1 rounded-full text-[10px] font-black flex flex-col items-center gap-1 mx-auto w-fit">
                <div class="flex items-center gap-2">
                    <i class="fa fa-circle text-[8px]"></i> <span id="status-texto">Verificando...</span>
                </div>
            </div>
            <p id="dia-horario" class="text-white/80 text-[10px] mt-1 font-bold uppercase tracking-tighter"></p>
        </div>
    </header>

    <section class="max-w-4xl mx-auto px-4 -mt-10 relative z-20">
        <div class="slider-container shadow-xl border-4 border-white">
            <div class="slider-wrapper" id="slider">
                <div class="slide">
                    <img src="https://images.unsplash.com/photo-1594433036440-422072175782?q=80&w=1000" alt="Feijoada">
                    <div class="slide-caption">FEIJOADA COMPLETA - AOS SÁBADOS E DOMINGOS</div>
                </div>
                <div class="slide">
                    <img src="https://images.unsplash.com/photo-1544025162-d76694265947?q=80&w=1000" alt="Churrasco">
                    <div class="slide-caption">CHURRASCO NA BRASA - TODOS OS DIAS</div>
                </div>
                <div class="slide">
                    <img src="https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=1000" alt="Drinks">
                    <div class="slide-caption">DRINKS EXCLUSIVOS DO BARBOSA</div>
                </div>
            </div>
        </div>
    </section>

    <nav class="sticky top-0 bg-white shadow-sm z-40 overflow-x-auto whitespace-nowrap p-4 flex gap-3 scrollbar-hide border-b mt-4">
        <button onclick="filterCategory('todas')" class="px-6 py-2 rounded-xl bg-orange-950 text-white text-xs font-bold uppercase">Todas</button>
        <button onclick="filterCategory('entradas')" class="px-6 py-2 rounded-xl bg-stone-100 text-stone-500 text-xs font-bold uppercase">Entradas</button>
        <button onclick="filterCategory('churrasco')" class="px-6 py-2 rounded-xl bg-stone-100 text-stone-500 text-xs font-bold uppercase">Churrasco</button>
        <button onclick="filterCategory('principais')" class="px-6 py-2 rounded-xl bg-stone-100 text-stone-500 text-xs font-bold uppercase">Baião/Feij.</button>
        <button onclick="filterCategory('bebidas')" class="px-6 py-2 rounded-xl bg-stone-100 text-stone-500 text-xs font-bold uppercase">Bebidas</button>
        <button onclick="filterCategory('drinks')" class="px-6 py-2 rounded-xl bg-stone-100 text-stone-500 text-xs font-bold uppercase">Drinks</button>
    </nav>

    <div class="max-w-4xl mx-auto px-4 mt-6">
        <div class="relative">
            <input type="text" id="search-input" oninput="searchProduct()" placeholder="Buscar no cardápio..." class="w-full bg-white border-2 border-stone-100 rounded-2xl py-4 pl-12 pr-4 outline-none focus:border-orange-800 shadow-sm font-medium">
            <i class="fa fa-search absolute left-5 top-1/2 -translate-y-1/2 text-stone-300"></i>
        </div>
    </div>

    <main class="max-w-4xl mx-auto p-4 grid grid-cols-1 md:grid-cols-2 gap-4" id="menu-container"></main>

    <div id="item-modal" class="fixed inset-0 bg-black/80 z-[70] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[2rem] p-8 shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-4 right-6 text-stone-300 text-3xl">&times;</button>
            <div id="modal-img-container" class="mb-4"></div>
            <h2 id="modal-item-title" class="font-bold text-2xl uppercase text-stone-800">ITEM</h2>
            <div id="modal-item-price" class="text-xl font-black text-green-600 mb-6">R$ 0,00</div>
            <textarea id="item-obs" class="w-full border-2 border-stone-50 rounded-xl p-4 h-24 outline-none bg-stone-50/50" placeholder="Ex: Gelo e limão..."></textarea>
            <div class="flex items-center justify-center mt-6 mb-6 gap-8">
                <button onclick="updateQty(-1)" class="bg-stone-100 w-12 h-12 rounded-xl font-bold">-</button>
                <div id="item-qty" class="text-xl font-black">1</div>
                <button onclick="updateQty(1)" class="bg-stone-100 w-12 h-12 rounded-xl font-bold">+</button>
            </div>
            <button onclick="confirmItem()" class="w-full bg-orange-950 text-white font-bold py-4 rounded-xl uppercase tracking-widest">Adicionar</button>
        </div>
    </div>

    <footer class="fixed bottom-0 w-full bg-white/95 backdrop-blur-md border-t p-4 z-50">
        <div class="max-w-4xl mx-auto flex items-center justify-between mb-4">
            <div>
                <span class="text-[9px] text-stone-400 uppercase font-black">Total</span>
                <p class="text-2xl font-black text-orange-950" id="cart-total">R$ 0,00</p>
            </div>
            <button onclick="toggleCartModal(true)" class="bg-orange-950 text-white px-8 py-4 rounded-2xl font-bold shadow-lg">Ver Comanda</button>
        </div>
        <div class="text-center pt-2 border-t text-[10px] font-black text-stone-400 uppercase">Desenvolvido por @lu4ncarlos</div>
    </footer>

    <div id="cart-modal" class="fixed inset-0 bg-black/80 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-[2rem] max-h-[90vh] flex flex-col p-6 shadow-2xl">
            <button onclick="toggleCartModal(false)" class="self-end text-stone-300 text-4xl">&times;</button>
            <h2 class="text-2xl font-serif font-bold mb-4">Minha Comanda</h2>
            <div id="cart-items" class="flex-1 overflow-y-auto space-y-2 mb-4 scrollbar-hide"></div>
            <select id="delivery-location" onchange="updateCartUI()" class="w-full rounded-xl p-4 border-2 mb-4 font-bold outline-none">
                <option value="0" data-fee="0">Selecione o Bairro...</option>
            </select>
            <div class="grid grid-cols-3 gap-2 mb-4">
                <button onclick="setPayment('Pix')" id="pay-Pix" class="payment-btn border-2 rounded-xl py-2 text-[10px] font-bold uppercase">Pix</button>
                <button onclick="setPayment('Cartão')" id="pay-Cartao" class="payment-btn border-2 rounded-xl py-2 text-[10px] font-bold uppercase">Cartão</button>
                <button onclick="setPayment('Dinheiro')" id="pay-Dinheiro" class="payment-btn border-2 rounded-xl py-2 text-[10px] font-bold uppercase">Dinheiro</button>
            </div>
            <input type="text" id="cust-name" placeholder="Nome / Mesa" class="w-full border-2 rounded-xl p-4 mb-4 font-bold outline-none">
            <button onclick="sendOrder()" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2">Enviar WhatsApp <i class="fab fa-whatsapp"></i></button>
        </div>
    </div>

    <script>
        const WHATSAPP_NUMBER = "5588992791644";
        const PRODUTOS = [
            { id: 1, cat: 'entradas', name: "Batata frita", price: 16.00, desc: "Crocante", img: "" },
            { id: 2, cat: 'entradas', name: "Batata recheada", price: 20.00, desc: "Cheddar, queijo, bacon", img: "" },
            { id: 3, cat: 'entradas', name: "Macaxeira frita", price: 16.00, desc: "Porção", img: "" },
            { id: 4, cat: 'entradas', name: "Macaxeira cozida", price: 16.00, desc: "Macia", img: "" },
            { id: 5, cat: 'entradas', name: "Bolinha de queijo", price: 18.00, desc: "12 unid.", img: "" },
            { id: 6, cat: 'entradas', name: "Bolinha de carne de sol", price: 18.00, desc: "12 unid.", img: "" },
            { id: 7, cat: 'entradas', name: "Costela com barbecue", price: 18.00, desc: "12 unid.", img: "" },
            { id: 8, cat: 'entradas', name: "Pastelzinho de carne de sol", price: 18.00, desc: "12 unid.", img: "" },
            { id: 9, cat: 'entradas', name: "Camarão empanado", price: 24.00, desc: "12 unid.", img: "" },
            { id: 10, cat: 'entradas', name: "Isca de peixe", price: 20.00, desc: "12 unid.", img: "" },
            { id: 11, cat: 'entradas', name: "Carne de sol", price: 40.00, desc: "Manteiga da terra", img: "" },
            { id: 12, cat: 'entradas', name: "Tripa de porco", price: 25.00, desc: "Sequinhha", img: "" },
            { id: 13, cat: 'entradas', name: "Moela", price: 20.00, desc: "Ao molho", img: "" },
            { id: 14, cat: 'entradas', name: "Asinha de frango", price: 25.00, desc: "Porção", img: "" },
            { id: 15, cat: 'entradas', name: "Porco trinchado", price: 30.00, desc: "Acebolado", img: "" },
            { id: 16, cat: 'entradas', name: "Filé com fritas", price: 40.00, desc: "Tradicional", img: "" },
            { id: 17, cat: 'entradas', name: "Peixe frito", price: 55.00, desc: "Inteiro", img: "" },
            { id: 18, cat: 'entradas', name: "Camarão alho e óleo", price: 40.00, desc: "Porção", img: "" },
            { id: 19, cat: 'churrasco', name: "Picanha (200g)", price: 22.00, desc: "Brasa", img: "" },
            { id: 20, cat: 'churrasco', name: "Picanha nordestina", price: 26.00, desc: "200g", img: "" },
            { id: 21, cat: 'churrasco', name: "Maminha", price: 18.00, desc: "200g", img: "" },
            { id: 22, cat: 'churrasco', name: "Carneiro", price: 20.00, desc: "200g", img: "" },
            { id: 23, cat: 'churrasco', name: "Costela de porco", price: 16.00, desc: "200g", img: "" },
            { id: 24, cat: 'churrasco', name: "Filé de porco", price: 18.00, desc: "200g", img: "" },
            { id: 25, cat: 'churrasco', name: "Linguiça", price: 6.00, desc: "Unidade", img: "" },
            { id: 26, cat: 'churrasco', name: "Frango", price: 12.00, desc: "Porção", img: "" },
            { id: 27, cat: 'churrasco', name: "Misto", price: 55.00, desc: "Boi/Porco/Ling/Frango", img: "" },
            { id: 28, cat: 'principais', name: "Baião de dois", price: 14.00, desc: "Festa", img: "" },
            { id: 29, cat: 'principais', name: "Baião cremoso", price: 20.00, desc: "Nata e Queijo", img: "" },
            { id: 30, cat: 'principais', name: "Feijoada Completa", price: 30.00, desc: "Sáb e Dom", img: "" },
            { id: 31, cat: 'bebidas', name: "Refri 1L (Coca/Fanta/Caj)", price: 10.00, desc: "Garrafa", img: "" },
            { id: 32, cat: 'bebidas', name: "Lata 350ml", price: 5.00, desc: "Vários", img: "" },
            { id: 33, cat: 'bebidas', name: "Skol/Brahma/Itaipava 600ml", price: 9.00, desc: "Gelada", img: "" },
            { id: 34, cat: 'bebidas', name: "Heineken 600ml", price: 15.00, desc: "Premium", img: "" },
            { id: 35, cat: 'drinks', name: "Barbosa Gim", price: 20.00, desc: "Especial", img: "" },
            { id: 36, cat: 'drinks', name: "Caipirinha", price: 15.00, desc: "Limão ou Maracujá", img: "" }
        ];

        let TAXAS_ENTREGA = [
            { bairro: "Centro", taxa: 3.00 }, { bairro: "Cirolândia", taxa: 4.00 }, { bairro: "Malvinas", taxa: 5.00 },
            { bairro: "Bulandeira", taxa: 4.00 }, { bairro: "Vila Santo Antonio", taxa: 5.00 }, { bairro: "Caldas", taxa: 6.00 },
            { bairro: "Arajara", taxa: 10.00 }, { bairro: "Retirada / Na Mesa", taxa: 0.00 }
        ];

        let cart = [];
        let curItem = null;
        let paymentMethod = "";
        let currentSlide = 0;

        window.onload = () => {
            checkStatus();
            renderMenu();
            renderDeliveryOptions();
            startSlider();
            setTimeout(() => { 
                document.getElementById('splash-screen').style.opacity = '0'; 
                setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 800); 
            }, 2500);
        };

        // Lógica de Horário e Texto
        function checkStatus() {
            const agora = new Date();
            const diaNum = agora.getDay(); 
            const hora = agora.getHours();
            const diasSemana = ["Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"];
            let aberto = false;
            let horarioTexto = "";

            if (diaNum === 5) { // Sexta
                if (hora >= 16) aberto = true;
                horarioTexto = "Hoje: 16h às 00h";
            } else if (diaNum === 6) { // Sábado
                if (hora >= 12) aberto = true;
                horarioTexto = "Hoje: 12h às 00h";
            } else if (diaNum === 0) { // Domingo
                if (hora >= 12 && hora < 22) aberto = true;
                horarioTexto = "Hoje: 12h às 22h";
            } else {
                horarioTexto = "Fechado hoje";
            }

            const statusDiv = document.getElementById('status-loja');
            const diaHorarioP = document.getElementById('dia-horario');
            
            diaHorarioP.innerText = `${diasSemana[diaNum]} • ${horarioTexto}`;
            
            if(aberto) {
                statusDiv.classList.add('bg-green-600', 'animate-pulse-green');
                document.getElementById('status-texto').innerText = "Aberto Agora";
            } else {
                statusDiv.classList.add('bg-red-600');
                document.getElementById('status-texto').innerText = "Fechado Agora";
            }
        }

        // Slider Automático
        function startSlider() {
            setInterval(() => {
                currentSlide = (currentSlide + 1) % 3;
                document.getElementById('slider').style.transform = `translateX(-${currentSlide * 100}%)`;
            }, 4000);
        }

        // Funções do Menu e Carrinho (Mantidas e otimizadas)
        function renderMenu(cat = 'todas') {
            const container = document.getElementById('menu-container');
            const search = document.getElementById('search-input').value.toLowerCase();
            const filtered = PRODUTOS.filter(p => (cat === 'todas' || p.cat === cat) && p.name.toLowerCase().includes(search));
            container.innerHTML = filtered.map(p => `
                <div onclick="openItemModal(${p.id})" class="bg-white p-4 rounded-3xl flex justify-between items-center cursor-pointer active:scale-95 shadow-sm">
                    <div class="flex-1 pr-2 text-left">
                        <h3 class="font-bold text-xs uppercase">${p.name}</h3>
                        <p class="text-[9px] text-stone-400">${p.desc}</p>
                        <p class="font-black text-orange-900 mt-1">R$ ${p.price.toFixed(2)}</p>
                    </div>
                    <div class="bg-stone-50 w-10 h-10 rounded-xl flex items-center justify-center border"><i class="fa fa-plus text-xs"></i></div>
                </div>`).join('');
        }

        function openItemModal(id) {
            const p = PRODUTOS.find(x => x.id === id);
            curItem = {...p, qty: 1};
            document.getElementById('modal-item-title').innerText = p.name;
            document.getElementById('modal-item-price').innerText = `R$ ${p.price.toFixed(2)}`;
            document.getElementById('item-qty').innerText = "1";
            document.getElementById('item-modal').classList.remove('hidden');
        }

        function updateQty(v) {
            curItem.qty = Math.max(1, curItem.qty + v);
            document.getElementById('item-qty').innerText = curItem.qty;
            document.getElementById('modal-item-price').innerText = `R$ ${(curItem.price * curItem.qty).toFixed(2)}`;
        }

        function confirmItem() {
            cart.push({...curItem, obs: document.getElementById('item-obs').value, finalPrice: curItem.price * curItem.qty});
            updateCartUI();
            closeModal();
        }

        function updateCartUI() {
            const select = document.getElementById('delivery-location');
            const fee = parseFloat(select.options[select.selectedIndex].getAttribute('data-fee') || 0);
            const subtotal = cart.reduce((acc, cur) => acc + cur.finalPrice, 0);
            document.getElementById('cart-total').innerText = `R$ ${(subtotal + fee).toFixed(2)}`;
            document.getElementById('cart-items').innerHTML = cart.map((item, i) => `
                <div class="flex justify-between items-center bg-stone-50 p-3 rounded-xl border">
                    <div class="text-left text-xs">
                        <p class="font-bold">${item.qty}x ${item.name}</p>
                        <p class="text-orange-800 font-bold">R$ ${item.finalPrice.toFixed(2)}</p>
                    </div>
                    <button onclick="removeItem(${i})" class="text-red-400"><i class="fa fa-trash-alt"></i></button>
                </div>`).join('');
        }

        function removeItem(i) { cart.splice(i, 1); updateCartUI(); }
        function closeModal() { document.getElementById('item-modal').classList.add('hidden'); }
        function toggleCartModal(s) { document.getElementById('cart-modal').classList.toggle('hidden', !s); }

        function renderDeliveryOptions() {
            const select = document.getElementById('delivery-location');
            TAXAS_ENTREGA.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.bairro;
                opt.setAttribute('data-fee', t.taxa);
                opt.innerText = `${t.bairro} - R$ ${t.taxa.toFixed(2)}`;
                select.appendChild(opt);
            });
        }

        function setPayment(m) {
            paymentMethod = m;
            document.querySelectorAll('.payment-btn').forEach(b => b.classList.remove('active', 'bg-orange-950', 'text-white'));
            document.getElementById(`pay-${m === 'Cartão' ? 'Cartao' : m}`).classList.add('active', 'bg-orange-950', 'text-white');
        }

        function sendOrder() {
            const name = document.getElementById('cust-name').value;
            const delivery = document.getElementById('delivery-location').value;
            if(!cart.length || !name || !paymentMethod || delivery === "0") return alert("Preencha tudo!");
            
            let msg = `*🍺 TERREIRO DO BARBOSA*\n*Cliente:* ${name}\n*Pagamento:* ${paymentMethod}\n*Local:* ${delivery}\n----------\n`;
            cart.forEach(i => msg += `${i.qty}x ${i.name} - R$ ${i.finalPrice.toFixed(2)}\n${i.obs ? '_Obs: '+i.obs+'_\n' : ''}`);
            msg += `----------\n*TOTAL: ${document.getElementById('cart-total').innerText}*`;
            window.open(`https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodeURIComponent(msg)}`);
        }

        function searchProduct() { renderMenu('todas'); }
        function filterCategory(cat) { renderMenu(cat); }

        // CORREÇÃO DO PAINEL ADM
        function openAdmin() {
            const password = prompt("Digite a senha administrativa:");
            if (password === "1234") {
                alert("Acesso liberado! (Funções de edição serão implementadas no banco de dados)");
                // Aqui você pode redirecionar ou abrir um modal de edição real
            } else if (password !== null) {
                alert("Senha incorreta!");
            }
        }
    </script>
</body>
</html>
