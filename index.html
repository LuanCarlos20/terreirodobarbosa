<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terreiro do Barbosa - Cardápio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8f5f2; }
        h1, h2, .font-serif { font-family: 'Playfair Display', serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }

        /* Imagem de Capa do Fundo - ATUALIZADA */
        .header-bg {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.7)), 
                        url('https://i.imgur.com/3aqQGlJ.jpeg');
            background-size: cover;
            background-position: center;
        }

        #splash-screen {
            position: fixed; inset: 0; background: #2d1610; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease-out, visibility 0.8s;
        }

        /* Efeitos de Status (Aberto/Fechado) */
        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .animate-pulse-green { animation: pulse-green 2s infinite; border-color: #22c55e !important; }
        .animate-pulse-red { animation: pulse-red 2s infinite; border-color: #ef4444 !important; }
        .payment-btn.active { background-color: #5d2906 !important; color: white !important; border-color: #5d2906 !important; }
    </style>
</head>
<body class="text-stone-900 pb-44">

    <div id="splash-screen">
        <img src="https://i.ibb.co/LzNfX6Xp/Whats-App-Image-2026-03-13-at-20-43-58.jpg" class="w-28 h-28 rounded-full border-4 border-yellow-700 mb-6 animate-bounce shadow-2xl">
        <h2 class="text-white text-lg font-serif italic text-yellow-500 px-6 text-center max-w-sm leading-relaxed">
            Sejam bem-vindos ao<br>
            <span class="text-2xl font-bold uppercase tracking-widest text-white">Terreiro do Barbosa</span>
        </h2>
    </div>

    <header class="w-full h-[280px] header-bg relative flex flex-col items-center justify-center shadow-inner">
        <div class="absolute top-4 left-4 z-10">
            <button onclick="openAdmin()" class="bg-black/30 text-white w-10 h-10 rounded-full flex items-center justify-center backdrop-blur-md border border-white/20">
                <i class="fas fa-lock text-sm"></i>
            </button>
        </div>
        
        <div class="absolute top-4 right-4 flex gap-3 z-10">
            <button onclick="shareMenu()" class="bg-black/30 text-white w-10 h-10 rounded-full flex items-center justify-center backdrop-blur-md border border-white/20">
                <i class="fas fa-share-alt"></i>
            </button>
            <a href="https://www.instagram.com/terreirodobarbosa" target="_blank" class="bg-black/30 text-white w-10 h-10 rounded-full flex items-center justify-center backdrop-blur-md border border-white/20">
                <i class="fab fa-instagram"></i>
            </a>
        </div>

        <div class="text-center z-10 mt-6">
            <img id="logo-loja" src="https://i.ibb.co/LzNfX6Xp/Whats-App-Image-2026-03-13-at-20-43-58.jpg" class="w-24 h-24 rounded-full object-cover border-4 border-transparent shadow-2xl mx-auto mb-3">
            <h1 class="text-white text-2xl font-serif font-bold uppercase tracking-widest px-4">Terreiro do Barbosa</h1>
            <div id="status-loja" class="mt-2 text-white px-5 py-1 rounded-full text-[10px] font-black flex items-center justify-center gap-2 mx-auto w-fit transition-all uppercase">
                <i class="fa fa-circle text-[8px]"></i> <span id="status-texto">Verificando...</span>
            </div>
        </div>
    </header>

    <nav class="sticky top-0 bg-white shadow-sm z-40 overflow-x-auto whitespace-nowrap p-4 flex gap-3 scrollbar-hide">
        <button onclick="filterCategory('todas')" class="px-6 py-2 rounded-xl bg-orange-950 text-white text-xs font-bold uppercase tracking-wider shadow-md">Todas</button>
        <button onclick="filterCategory('entradas')" class="px-6 py-2 rounded-xl bg-stone-100 text-stone-500 text-xs font-bold uppercase tracking-wider">Entradas</button>
        <button onclick="filterCategory('churrasco')" class="px-6 py-2 rounded-xl bg-stone-100 text-stone-500 text-xs font-bold uppercase tracking-wider">Churrasco</button>
        <button onclick="filterCategory('bebidas')" class="px-6 py-2 rounded-xl bg-stone-100 text-stone-500 text-xs font-bold uppercase tracking-wider">Bebidas</button>
        <button onclick="filterCategory('drinks')" class="px-6 py-2 rounded-xl bg-stone-100 text-stone-500 text-xs font-bold uppercase tracking-wider">Drinks</button>
    </nav>

    <div class="max-w-4xl mx-auto px-4 mt-6">
        <div class="relative">
            <input type="text" id="search-input" oninput="searchProduct()" placeholder="Buscar no cardápio..." 
                   class="w-full bg-white border-2 border-stone-100 rounded-2xl py-4 pl-12 pr-4 outline-none focus:border-orange-800 transition-all shadow-sm font-medium">
            <i class="fa fa-search absolute left-5 top-1/2 -translate-y-1/2 text-stone-300"></i>
        </div>
    </div>

    <main class="max-w-4xl mx-auto p-4 grid grid-cols-1 md:grid-cols-2 gap-4" id="menu-container"></main>

    <div id="item-modal" class="fixed inset-0 bg-black/80 z-[70] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[2rem] p-8 shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-4 right-6 text-stone-300 text-3xl">&times;</button>
            <h2 id="modal-item-title" class="font-bold text-2xl uppercase text-stone-800 mb-1 pr-8">ITEM</h2>
            <div id="modal-item-price" class="text-xl font-black text-green-600 mb-6 tracking-tight">R$ 0,00</div>
            
            <label class="font-bold text-[10px] text-stone-400 uppercase mb-2 block tracking-widest">Alguma observação?</label>
            <textarea id="item-obs" class="w-full border-2 border-stone-50 rounded-xl p-4 h-28 outline-none focus:border-orange-900 resize-none font-medium bg-stone-50/50" placeholder="Ex: Sem cebola, gelo e limão à parte..."></textarea>
            
            <div class="flex items-center justify-center mt-8 mb-8 gap-8">
                <button onclick="updateQty(-1)" class="bg-stone-100 w-14 h-14 rounded-2xl font-bold text-2xl active:scale-90 transition-all">-</button>
                <div id="item-qty" class="text-2xl font-black w-6 text-center">1</div>
                <button onclick="updateQty(1)" class="bg-stone-100 w-14 h-14 rounded-2xl font-bold text-2xl active:scale-90 transition-all">+</button>
            </div>

            <button onclick="confirmItem()" class="w-full bg-orange-950 text-white font-bold py-5 rounded-2xl uppercase tracking-widest shadow-xl active:scale-95 transition-all">
                Adicionar à Comanda
            </button>
        </div>
    </div>

    <footer class="fixed bottom-0 w-full bg-white/95 backdrop-blur-md border-t p-4 z-50 shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
        <div class="max-w-4xl mx-auto flex items-center justify-between mb-4">
            <div>
                <span class="text-[9px] text-stone-400 uppercase font-black tracking-widest">Total com Entrega</span>
                <p class="text-2xl font-black text-orange-950" id="cart-total">R$ 0,00</p>
            </div>
            <button onclick="toggleCartModal(true)" class="bg-orange-950 text-white px-8 py-4 rounded-2xl font-bold flex items-center gap-3 shadow-lg active:scale-95 transition-all">
                Ver Comanda <i class="fa fa-receipt text-xs opacity-40"></i>
            </button>
        </div>
        <div class="text-center pt-3 border-t border-stone-100 flex justify-center items-center gap-4">
            <span class="text-[10px] font-black text-stone-400 uppercase tracking-tighter">Dev lu4ncarlos</span>
            <a href="https://www.instagram.com/luancarlos_dev" target="_blank" class="text-pink-600 text-lg hover:scale-110 transition-transform">
                <i class="fab fa-instagram"></i>
            </a>
        </div>
    </footer>

    <div id="cart-modal" class="fixed inset-0 bg-black/80 z-[60] hidden flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] max-h-[90vh] flex flex-col p-6 shadow-2xl relative">
            <button onclick="toggleCartModal(false)" class="absolute top-5 right-6 text-stone-300 text-4xl">&times;</button>
            <h2 class="text-2xl font-serif font-bold mb-6 border-b pb-4">Minha Comanda</h2>
            
            <div id="cart-items" class="flex-1 overflow-y-auto space-y-3 pr-1 scrollbar-hide mb-6"></div>

            <div class="bg-stone-50 p-5 rounded-3xl border border-stone-100 mb-6">
                <label class="font-bold text-[10px] uppercase text-stone-400 tracking-widest block mb-2">Bairro de Entrega</label>
                <select id="delivery-location" onchange="updateCartUI()" class="w-full rounded-xl p-4 bg-white border-2 border-stone-100 font-bold outline-none focus:border-orange-950">
                    <option value="0" data-fee="0">Selecione onde entregar...</option>
                </select>
                <div class="flex justify-between items-center mt-4 pt-4 border-t border-stone-200">
                    <span class="font-bold text-stone-500">Valor Final:</span>
                    <span class="font-black text-2xl text-orange-950" id="summary-total">R$ 0,00</span>
                </div>
            </div>

            <div class="space-y-3">
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setPayment('Pix')" id="pay-Pix" class="payment-btn border-2 border-stone-100 rounded-xl py-3 text-[10px] font-bold uppercase transition-all">Pix</button>
                    <button onclick="setPayment('Cartão')" id="pay-Cartao" class="payment-btn border-2 border-stone-100 rounded-xl py-3 text-[10px] font-bold uppercase transition-all">Cartão</button>
                    <button onclick="setPayment('Dinheiro')" id="pay-Dinheiro" class="payment-btn border-2 border-stone-100 rounded-xl py-3 text-[10px] font-bold uppercase transition-all">Dinheiro</button>
                </div>

                <div id="troco-container" class="hidden">
                    <input type="number" id="valor-troco" placeholder="Troco para quanto?" class="w-full border-2 border-stone-100 rounded-xl p-4 font-bold outline-none focus:border-orange-950">
                </div>

                <input type="text" id="cust-name" placeholder="Seu Nome / Nº Mesa" class="w-full border-2 border-stone-100 rounded-xl p-4 font-bold outline-none focus:border-orange-950">
                <input type="text" id="cust-address" placeholder="Endereço de Entrega" class="w-full border-2 border-stone-100 rounded-xl p-4 font-bold outline-none focus:border-orange-950">
                
                <button onclick="sendOrder()" class="w-full bg-green-600 text-white font-bold py-5 rounded-2xl text-lg shadow-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
                    Enviar Pedido <i class="fab fa-whatsapp text-xl"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="fixed inset-0 bg-black/95 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-3xl p-8 max-h-[85vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-bold uppercase tracking-widest">Preços</h2>
                <button onclick="closeAdmin()" class="text-3xl font-bold text-red-500">&times;</button>
            </div>
            <div id="admin-product-list" class="space-y-2"></div>
            <button onclick="saveAdmin()" class="w-full bg-green-600 text-white py-5 rounded-xl font-bold mt-8 uppercase">Salvar Alterações</button>
        </div>
    </div>

    <script>
        const WHATSAPP_NUMBER = "5588992791644";
        
        let PRODUTOS = JSON.parse(localStorage.getItem('barbosa_db')) || [
            { id: 1, cat: 'entradas', name: "Batata frita", price: 16.00, desc: "Porção crocante tradicional" },
            { id: 2, cat: 'entradas', name: "Batata recheada", price: 20.00, desc: "Cheddar, queijo e bacon" },
            { id: 3, cat: 'entradas', name: "Macaxeira frita", price: 16.00, desc: "Porção bem crocante" },
            { id: 4, cat: 'entradas', name: "Macaxeira cozida", price: 16.00, desc: "Macia e saborosa" },
            { id: 5, cat: 'entradas', name: "Bolinha de queijo", price: 18.00, desc: "12 unidades fritas na hora" },
            { id: 6, cat: 'entradas', name: "Bolinha de carne de sol", price: 18.00, desc: "12 unidades super recheadas" },
            { id: 7, cat: 'entradas', name: "Carne de sol", price: 40.00, desc: "Porção acebolada com manteiga da terra" },
            { id: 8, cat: 'entradas', name: "Filé com fritas", price: 40.00, desc: "Iscas de filé premium e batata" },
            { id: 9, cat: 'churrasco', name: "Picanha (200g)", price: 22.00, desc: "Corte selecionado na brasa" },
            { id: 10, cat: 'churrasco', name: "Picanha nordestina", price: 26.00, desc: "Completa com acompanhamentos" },
            { id: 11, cat: 'churrasco', name: "Baião cremoso", price: 20.00, desc: "Com queijo coalho e nata" },
            { id: 12, cat: 'bebidas', name: "Coca-Cola 1L", price: 10.00, desc: "Garrafa bem gelada" },
            { id: 13, cat: 'bebidas', name: "Heineken 600ml", price: 15.00, desc: "Longneck estupidamente gelada" },
            { id: 14, cat: 'drinks', name: "Barbosa Gim", price: 20.00, desc: "Drink especial Terreiro" }
        ];

        let TAXAS_ENTREGA = [
            { bairro: "Centro", taxa: 3.00 }, { bairro: "Cirolândia", taxa: 4.00 }, { bairro: "Malvinas", taxa: 5.00 },
            { bairro: "Bulandeira", taxa: 4.00 }, { bairro: "Vila Santo Antonio", taxa: 5.00 }, { bairro: "Caldas", taxa: 6.00 },
            { bairro: "Arajara", taxa: 10.00 }, { bairro: "Retirada no Local", taxa: 0.00 }
        ];

        let cart = [];
        let curItem = null;
        let paymentMethod = "";

        window.onload = () => {
            checkStatus();
            renderMenu();
            renderDeliveryOptions();
            setTimeout(() => { 
                document.getElementById('splash-screen').style.opacity = '0'; 
                setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 800); 
            }, 2000);
            setInterval(checkStatus, 60000);
        };

        function shareMenu() {
            if (navigator.share) {
                navigator.share({ title: 'Terreiro do Barbosa', text: 'Veja nosso cardápio!', url: window.location.href });
            }
        }

        function checkStatus() {
            const hora = new Date().getHours();
            const aberto = (hora >= 17 && hora < 24);
            const div = document.getElementById('status-loja');
            const logo = document.getElementById('logo-loja');
            if(aberto) {
                div.className = "mt-2 text-white px-5 py-1 rounded-full text-[10px] font-black flex items-center justify-center gap-2 bg-green-600 animate-pulse-green mx-auto w-fit transition-all";
                logo.className = "w-24 h-24 rounded-full object-cover border-4 animate-pulse-green mx-auto mb-3 shadow-2xl";
                document.getElementById('status-texto').innerText = "Aberto Agora";
            } else {
                div.className = "mt-2 text-white px-5 py-1 rounded-full text-[10px] font-black flex items-center justify-center gap-2 bg-red-600 animate-pulse-red mx-auto w-fit transition-all";
                logo.className = "w-24 h-24 rounded-full object-cover border-4 animate-pulse-red mx-auto mb-3 shadow-2xl";
                document.getElementById('status-texto').innerText = "Fechado";
            }
        }

        function renderMenu(cat = 'todas') {
            const container = document.getElementById('menu-container');
            const search = document.getElementById('search-input').value.toLowerCase();
            const filtered = PRODUTOS.filter(p => (cat === 'todas' || p.cat === cat) && p.name.toLowerCase().includes(search));
            
            container.innerHTML = filtered.map(p => `
                <div onclick="openItemModal(${p.id})" class="bg-white p-5 rounded-3xl shadow-sm border-2 border-transparent hover:border-orange-50 flex justify-between items-center cursor-pointer active:scale-95 transition-all">
                    <div class="text-left flex-1 pr-4">
                        <h3 class="font-bold text-sm uppercase text-stone-700 tracking-tight">${p.name}</h3>
                        <p class="text-[10px] text-stone-400 mt-1 line-clamp-1">${p.desc}</p>
                        <p class="font-black text-orange-900 text-lg mt-2">R$ ${p.price.toFixed(2)}</p>
                    </div>
                    <div class="bg-stone-50 w-12 h-12 rounded-2xl flex items-center justify-center text-orange-950 border border-stone-100"><i class="fa fa-plus text-sm"></i></div>
                </div>`).join('');
        }

        function openItemModal(id) {
            const p = PRODUTOS.find(x => x.id === id);
            curItem = {...p, qty: 1};
            document.getElementById('modal-item-title').innerText = p.name;
            document.getElementById('modal-item-price').innerText = `R$ ${p.price.toFixed(2)}`;
            document.getElementById('item-qty').innerText = "1";
            document.getElementById('item-obs').value = "";
            document.getElementById('item-modal').classList.remove('hidden');
        }

        function updateQty(v) {
            curItem.qty = Math.max(1, curItem.qty + v);
            document.getElementById('item-qty').innerText = curItem.qty;
            document.getElementById('modal-item-price').innerText = `R$ ${(curItem.price * curItem.qty).toFixed(2)}`;
        }

        function confirmItem() {
            const obsValue = document.getElementById('item-obs').value.trim();
            cart.push({...curItem, obs: obsValue, finalPrice: curItem.price * curItem.qty});
            updateCartUI();
            closeModal();
        }

        function updateCartUI() {
            const select = document.getElementById('delivery-location');
            const fee = parseFloat(select.options[select.selectedIndex].getAttribute('data-fee') || 0);
            const subtotal = cart.reduce((acc, cur) => acc + cur.finalPrice, 0);
            
            document.getElementById('cart-total').innerText = `R$ ${(subtotal + fee).toFixed(2)}`;
            document.getElementById('summary-total').innerText = `R$ ${(subtotal + fee).toFixed(2)}`;
            document.getElementById('cart-items').innerHTML = cart.map((item, i) => `
                <div class="flex justify-between items-center bg-stone-50 p-4 rounded-2xl border-2 border-stone-100 text-left relative overflow-hidden">
                    <div class="z-10">
                        <p class="font-black text-xs uppercase text-stone-800">${item.qty}x ${item.name}</p>
                        ${item.obs ? `<p class="text-[10px] text-orange-800 italic font-bold bg-orange-100/50 px-2 py-1 rounded-lg mt-1 w-fit">"${item.obs}"</p>` : ''}
                        <p class="font-bold text-stone-500 mt-1">R$ ${item.finalPrice.toFixed(2)}</p>
                    </div>
                    <button onclick="removeItem(${i})" class="text-red-400 p-3 hover:bg-red-50 rounded-xl transition-all"><i class="fa fa-trash-alt"></i></button>
                </div>`).join('');
        }

        function sendOrder() {
            const name = document.getElementById('cust-name').value.trim();
            const addr = document.getElementById('cust-address').value.trim();
            const deliverySelect = document.getElementById('delivery-location');
            const deliveryBairro = deliverySelect.value;
            const deliveryFee = parseFloat(deliverySelect.options[deliverySelect.selectedIndex].getAttribute('data-fee'));

            if(!cart.length || !name || !paymentMethod || deliveryBairro === "0") {
                return alert("Preencha seu Nome, Pagamento e Bairro!");
            }

            let msg = `*🍺 TERREIRO DO BARBOSA - NOVO PEDIDO*\n`;
            msg += `------------------------------------------\n`;
            msg += `👤 *Cliente:* ${name}\n`;
            msg += `📍 *Endereço:* ${addr || 'Retirada/Local'}\n`;
            msg += `💳 *Pagamento:* ${paymentMethod}\n`;
            if(paymentMethod === 'Dinheiro') {
                const troco = document.getElementById('valor-troco').value;
                msg += `💵 *Troco para:* ${troco ? 'R$ '+troco : 'Não precisa'}\n`;
            }
            msg += `------------------------------------------\n\n`;
            msg += `*ITENS:*\n`;
            
            cart.forEach(i => {
                msg += `✅ *${i.qty}x ${i.name.toUpperCase()}*\n`;
                if(i.obs) msg += `   _Obs: ${i.obs}_\n`;
                msg += `   Valor: R$ ${i.finalPrice.toFixed(2)}\n\n`;
            });

            const subtotal = cart.reduce((acc, cur) => acc + cur.finalPrice, 0);
            msg += `------------------------------------------\n`;
            msg += `💰 *Subtotal:* R$ ${subtotal.toFixed(2)}\n`;
            msg += `🚚 *Taxa de Entrega:* R$ ${deliveryFee.toFixed(2)} (${deliveryBairro})\n`;
            msg += `*TOTAL FINAL: R$ ${(subtotal + deliveryFee).toFixed(2)}*`;

            window.open(`https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodeURIComponent(msg)}`);
        }

        function closeModal() { document.getElementById('item-modal').classList.add('hidden'); }
        function toggleCartModal(s) { document.getElementById('cart-modal').classList.toggle('hidden', !s); }
        function removeItem(i) { cart.splice(i, 1); updateCartUI(); }
        function filterCategory(cat) { 
            renderMenu(cat);
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('bg-orange-950', 'text-white');
                btn.classList.add('bg-stone-100', 'text-stone-500');
            });
            event.currentTarget.classList.add('bg-orange-950', 'text-white');
            event.currentTarget.classList.remove('bg-stone-100', 'text-stone-500');
        }
        function searchProduct() { renderMenu('todas'); }

        function renderDeliveryOptions() {
            const select = document.getElementById('delivery-location');
            TAXAS_ENTREGA.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.bairro;
                opt.setAttribute('data-fee', t.taxa);
                opt.innerText = `${t.bairro} (R$ ${t.taxa.toFixed(2)})`;
                select.appendChild(opt);
            });
        }

        function setPayment(m) { 
            paymentMethod = m; 
            document.querySelectorAll('.payment-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`pay-${m === 'Cartão' ? 'Cartao' : m}`).classList.add('active');
            document.getElementById('troco-container').classList.toggle('hidden', m !== 'Dinheiro');
        }

        function openAdmin() {
            if(prompt("Senha:") === "1234") {
                document.getElementById('admin-modal').classList.remove('hidden');
                document.getElementById('admin-product-list').innerHTML = PRODUTOS.map((p, i) => `
                    <div class="flex justify-between items-center p-3 border-2 border-stone-100 rounded-xl mb-2">
                        <span class="font-bold uppercase text-[10px] w-1/2">${p.name}</span>
                        <input type="number" step="0.5" value="${p.price}" onchange="PRODUTOS[${i}].price = parseFloat(this.value)" class="w-20 border-2 rounded-lg p-2 font-black text-center outline-none focus:border-orange-900">
                    </div>`).join('');
            }
        }
        function saveAdmin() {
            localStorage.setItem('barbosa_db', JSON.stringify(PRODUTOS));
            alert("Salvo!");
            renderMenu();
            document.getElementById('admin-modal').classList.add('hidden');
        }
        function closeAdmin() { document.getElementById('admin-modal').classList.add('hidden'); }
    </script>
