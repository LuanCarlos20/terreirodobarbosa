<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Consultórios</title>

<style>
body{
    font-family:Arial;
    margin:0;
    padding:20px;
    background:#eef2f7;
}

.topo{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

h1{
    color:#0d6efd;
    margin:0;
}

#relogio{
    background:#000;
    color:#0f0;
    padding:10px 20px;
    border-radius:10px;
    font-size:20px;
    font-weight:bold;
}

#data{
    color:#555;
    margin-top:5px;
    font-size:14px;
}

.caixa{
    background:#fff;
    padding:15px;
    margin-top:20px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

h2{
    margin:0 0 10px 0;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.item{
    background:#f4f4f4;
    padding:10px;
    border-radius:8px;
}

.numero{
    font-weight:bold;
    font-size:16px;
    color:#000;
}

input{
    width:100%;
    padding:6px;
    margin-top:3px;
    margin-bottom:5px;
    border:1px solid #ccc;
    border-radius:5px;
}

.status{
    font-weight:bold;
    margin-left:5px;
}

.on{color:green;}
.off{color:red;}

button{
    padding:6px 10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    margin-top:5px;
    color:white;
}

.btnOn{background:#28a745;}
.btnOff{background:#dc3545;}

</style>
</head>

<body>

<div class="topo">
    <div>
        <h1>Painel Consultórios</h1>
        <div id="data"></div>
    </div>
    <div id="relogio"></div>
</div>

<div id="conteudo"></div>

<script>

function relogio(){
    const d=new Date();
    document.getElementById("relogio").innerHTML=d.toLocaleTimeString();
    document.getElementById("data").innerHTML=
    d.toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"2-digit",year:"numeric"});
}

// CONSULTÓRIOS 03–12 (SEM UNDEFINED)
let dados=[
{c:3,manha:"",tarde:"",onM:false,onT:false},
{c:4,manha:"",tarde:"",onM:false,onT:false},
{c:5,manha:"",tarde:"",onM:false,onT:false},
{c:6,manha:"",tarde:"",onM:false,onT:false},
{c:7,manha:"",tarde:"",onM:false,onT:false},
{c:8,manha:"",tarde:"",onM:false,onT:false},
{c:9,manha:"",tarde:"",onM:false,onT:false},
{c:10,manha:"",tarde:"",onM:false,onT:false},
{c:11,manha:"",tarde:"",onM:false,onT:false},
{c:12,manha:"",tarde:"",onM:false,onT:false}
];

function salvar(){
    localStorage.setItem("consultorios",JSON.stringify(dados));
}

function carregar(){
    let s=localStorage.getItem("consultorios");
    if(s) dados=JSON.parse(s);
}

// toggle seguro (SEM ERRO)
function toggle(i,tipo){

if(tipo==="M"){
dados[i].onM=!dados[i].onM;
}

if(tipo==="T"){
dados[i].onT=!dados[i].onT;
}

salvar();
render();

}

function render(){

let html="";

html+=`
<div class="caixa">
<h2>CONSULTÓRIOS (03 - 12)</h2>

<div class="grid">
`;

dados.forEach((d,i)=>{

// GARANTIA PARA NÃO DAR UNDEFINED
let numero=d.c || (i+3);

let manha=d.manha || "";
let tarde=d.tarde || "";

html+=`
<div class="item">

<div class="numero">Consultório ${numero}</div>

<br>

<b>Manhã:</b><br>
<input value="${manha}" onchange="dados[${i}].manha=this.value;salvar()">
<span class="status ${d.onM?'on':'off'}">
${d.onM?'🟢 ON':'🔴 OFF'}
</span><br>
<button class="${d.onM?'btnOff':'btnOn'}" onclick="toggle(${i},'M')">
${d.onM?'Desligar':'Ligar'}
</button>

<br><br>

<b>Tarde:</b><br>
<input value="${tarde}" onchange="dados[${i}].tarde=this.value;salvar()">
<span class="status ${d.onT?'on':'off'}">
${d.onT?'🟢 ON':'🔴 OFF'}
</span><br>
<button class="${d.onT?'btnOff':'btnOn'}" onclick="toggle(${i},'T')">
${d.onT?'Desligar':'Ligar'}
</button>

</div>

`;

});

html+=`
</div>
</div>
`;

document.getElementById("conteudo").innerHTML=html;

}

setInterval(relogio,1000);

carregar();
render();
relogio();

</script>

</body>
</html>
